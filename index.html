<!DOCTYPE html>
<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Mick the Plumber: Pipe Panic</title>
<style>
  html, body {
    margin: 0; padding: 0; width: 100%; height: 100%;
    background: #0b1420;
    overflow: hidden;
    font-family: 'Courier New', ui-monospace, monospace;
    touch-action: none;
    -webkit-user-select: none; user-select: none;
    -webkit-touch-callout: none;
    -webkit-tap-highlight-color: transparent;
  }
  #wrap {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: radial-gradient(circle at 50% 40%, #16273b 0%, #0b1420 100%);
  }
  canvas#game {
    image-rendering: pixelated;
    image-rendering: -moz-crisp-edges;
    image-rendering: crisp-edges;
    background: #0b1420;
    touch-action: none;
    display: block;
  }
  /* On-screen touch controls (created by JS; shown only on touch devices) */
  #touch { position: fixed; inset: 0; z-index: 15; pointer-events: none; display: none; }
  #touch.on { display: block; }
  .tbtn {
    position: fixed; pointer-events: auto;
    background: rgba(20,34,52,0.42);
    border: 2px solid rgba(244,233,216,0.55);
    color: #f4e9d8;
    display: flex; align-items: center; justify-content: center;
    font-family: inherit; font-weight: bold;
    border-radius: 14px;
    touch-action: none; user-select: none;
    box-shadow: 0 3px 10px rgba(0,0,0,0.35);

  .tbtn.round { border-radius: 50%; }
  .tbtn.press { background: rgba(90,197,79,0.5); border-color: #8ce04b; }
  #topbtns { position: fixed; top: 8px; right: 8px; z-index: 20; display: flex; gap: 8px; }
  .cornerbtn {
    width: 42px; height: 42px;
    background: rgba(20,34,52,0.82);
    border: 2px solid #f4e9d8;
    color: #f4e9d8;
    font-size: 20px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    touch-action: manipulation;
  }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game"></canvas>
</div>
<div id="topbtns">
  <button id="pauseBtn" class="cornerbtn" title="Pause">&#9208;</button>
  <button id="muteBtn" class="cornerbtn" title="Mute">&#128266;</button>
</div>
<div id="touch"></div>
<audio id="bgm" src="./song.mp3" loop preload="auto"></audio>
<script>
"use strict";
/* =====================================================================
   MICK THE PLUMBER: PIPE PANIC  (v2 — SMB3-inspired platformer rebuild)
   Single self-contained file. Vanilla Canvas. Only external asset: song.mp3
   ===================================================================== */
(function () {

/* ---------------------------------------------------------------
   0. CONSTANTS
   --------------------------------------------------------------- */
var TILE = 32;
var BASE_W = 480, BASE_H = 270;      // internal render resolution (16:9)
var GAME = {}; // populated below; exposed for headless tests

// Physics (binding — from GDD)
var PHYS = {
  WALK_ACCEL: 900,
  WALK_MAX: 160,
  RUN_MAX: 280,
  RUN_RAMP: 1.0,          // seconds of sustained run to reach RUN_MAX (P-meter)
  FRICTION: 1400,
  SKID_THRESH: 200,
  SKID_DECEL: 2200,
  GRAVITY: 2600,
  JUMP_GRAV: 1500,        // reduced gravity while jump held & rising
  JUMP_V_WALK: -520,
  JUMP_V_RUN: -580,
  TERMINAL: 900,
  COYOTE: 0.090,
  JUMP_BUFFER: 0.120,
  SQUASH: 0.080,
  STOMP_BOUNCE: -400,
  DUCK_H: 28,
  STAND_H: 44,            // Mick collision box height standing (sprite is 48 tall, feet padding)
  BODY_W: 20,
  SLIDE_TIME: 0.30,
  IFRAME: 1.2,
  KNOCK_X: 180,
  KNOCK_Y: -300,
  BPM: 92
};

var DT_CAP = 1/30;        // never integrate more than this per step
var SUBSTEP_SPEED = 240;  // px/s above which we substep

/* ---------------------------------------------------------------
   1. PALETTE
   --------------------------------------------------------------- */
var C = {
  // stone
  stoneLo:'#4b483f', stone:'#6e6a5e', stoneHi:'#8a8576', stoneDk:'#3a382f',
  mortar:'#2c2a24',
  moss:'#4e6b32', mossHi:'#6f8f45',
  wet:'#33485a',
  // steel
  steelLo:'#5c6774', steel:'#8b98a6', steelHi:'#b3bec9', steelDk:'#3f4954',
  rust:'#8a5a34', rustHi:'#b57a49',
  rivet:'#c9d2db',
  // pipes
  copper:'#b3703a', copperHi:'#e0a05e', copperDk:'#6e4222',
  pipeSteel:'#7d8896',
  // slime / accents
  slime:'#5ac54f', slimeHi:'#8ce04b', slimeDk:'#3a8e34',
  // water
  water:'#2e86ab', waterHi:'#57b6d6', waterDeep:'#1c5570', foam:'#dff3fb',
  // lamp
  lamp:'#ffd27a', lampGlow:'#ffbe57',
  // mick
  overall:'#2f8f9e', overallHi:'#43b4c4', overallDk:'#1d6470',
  cap:'#e8792e', capHi:'#ffa14d',
  skin:'#e0a878', skinDk:'#b6814f',
  boot:'#3a2e26', bootHi:'#5a4638',
  wrench:'#c9c9c9', wrenchHi:'#eeeeee', wrenchDk:'#7d7d7d',
  stache:'#4a2f1a',
  // ui
  ink:'#f4e9d8', inkDk:'#1a2636', panel:'#122033', panelHi:'#20344c',
  heart:'#e0435a', heartHi:'#ff7a8c',
  gold:'#ffce54', goldHi:'#ffe89b',
  red:'#d84b4b', blue:'#4b7fd8', brass:'#d9a441',
  bg0:'#0e1c2c', bg1:'#16283c', bg2:'#22384f', bgFar:'#0a1622'
};

/* ---------------------------------------------------------------
   2. PIXEL ART ENGINE — draw pixel arrays to offscreen atlases
   --------------------------------------------------------------- */
function makeCanvas(w,h){
  var c = (typeof document!=='undefined' && document.createElement)
    ? document.createElement('canvas')
    : { width:w, height:h, getContext:function(){ return stubCtx(); } };
  c.width=w; c.height=h;
  return c;
}
// A minimal 2D context stub so art building doesn't crash in headless node tests.
function stubCtx(){
  var noop=function(){};
  return {
    fillStyle:'', strokeStyle:'', globalAlpha:1, lineWidth:1, font:'', textAlign:'', textBaseline:'',
    imageSmoothingEnabled:true, lineCap:'', lineJoin:'', shadowBlur:0, shadowColor:'',
    fillRect:noop, strokeRect:noop, clearRect:noop, beginPath:noop, closePath:noop,
    moveTo:noop, lineTo:noop, arc:noop, arcTo:noop, ellipse:noop, rect:noop,
    fill:noop, stroke:noop, save:noop, restore:noop, translate:noop, scale:noop,
    rotate:noop, drawImage:noop, fillText:noop, strokeText:noop, createLinearGradient:function(){return{addColorStop:noop};},
    createRadialGradient:function(){return{addColorStop:noop};}, setTransform:noop, clip:noop,
    quadraticCurveTo:noop, bezierCurveTo:noop, getImageData:function(){return{data:[]};}, putImageData:noop,
    measureText:function(){return{width:0};}
  };
}

// px(ctx,x,y,w,h,color) — draw a filled block at pixel-grid coords with scale factor s.
function pxRect(g,x,y,w,h,col){ g.fillStyle=col; g.fillRect(x,y,w,h); }

/* Render a small ASCII pixmap (array of strings) using a color legend.
   Each char = one pixel, ' ' or '.' = transparent. Scale is applied. */
function drawPixmap(g, rows, legend, ox, oy, s){
  s = s||1;
  for(var y=0;y<rows.length;y++){
    var row=rows[y];
    for(var x=0;x<row.length;x++){
      var ch=row[x];
      if(ch===' '||ch==='.'||ch==='_') continue;
      var col=legend[ch];
      if(!col) continue;
      g.fillStyle=col;
      g.fillRect(ox+x*s, oy+y*s, s, s);
    }
  }
}

/* ---------------------------------------------------------------
   3. TILE ATLAS — 32px tiles with variants, built procedurally
   --------------------------------------------------------------- */
var ATLAS = {}; // name -> canvas

function rnd(seed){ // deterministic pseudo-random for tile texture
  var x = Math.sin(seed*127.1+311.7)*43758.5453;
  return x - Math.floor(x);
}

function buildStoneTile(name, base, hi, lo, opts){
  opts = opts||{};
  var c=makeCanvas(TILE,TILE), g=c.getContext('2d');
  // mortar background
  pxRect(g,0,0,TILE,TILE,C.mortar);
  // two-brick-per-row masonry with offset
  var bh=8, seedbase = opts.seed||1;
  for(var by=0, r=0; by<TILE; by+=bh, r++){
    var offset = (r%2===0)?0:-16;
    for(var bx=offset; bx<TILE; bx+=16){
      var bw=15;
      var s = seedbase + r*7 + (bx+64);
      var shade = rnd(s);
      var col = base;
      if(shade>0.72) col=hi; else if(shade<0.3) col=lo;
      pxRect(g, bx+1, by+1, Math.min(bw,TILE-bx-1)- ( (bx<0)?(-bx):1 ) +1, bh-2, col);
      // clamp draw within tile
    }
  }
  // redraw cleanly with clipping to avoid overflow artifacts
  g.clearRect(0,0,TILE,TILE);
  pxRect(g,0,0,TILE,TILE,C.mortar);
  for(var by2=0, rr=0; by2<TILE; by2+=bh, rr++){
    var off2=(rr%2===0)?0:8;
    for(var bx2=-off2; bx2<TILE; bx2+=16){
      var s2=seedbase+rr*13+(bx2+80);
      var shade2=rnd(s2);
      var col2=base;
      if(shade2>0.74) col2=hi; else if(shade2<0.30) col2=lo;
      var dx=Math.max(0,bx2+1), dw=Math.min(TILE,bx2+15)-dx;
      if(dw>0){ pxRect(g,dx,by2+1,dw,bh-2,col2); }
      // per-brick speckle
      var sp=rnd(s2*3.1);
      if(sp>0.6 && dw>3){ pxRect(g, dx+Math.floor(sp*(dw-2)), by2+1+Math.floor(rnd(s2*7)*(bh-3)),1,1, (sp>0.8?hi:lo)); }
    }
  }
  // variant overlays
  if(opts.crack){
    // diagonal crack
    var cx=8+Math.floor(rnd(seedbase)*8);
    for(var i=0;i<20;i++){
      var yy=6+i, xx=cx+Math.floor(Math.sin(i*0.7)*3)+Math.floor(i*0.4);
      if(xx>=0&&xx<TILE&&yy<TILE){ pxRect(g,xx,yy,1,1,C.stoneDk); pxRect(g,xx+1,yy,1,1,C.mortar); }
    }
  }
  if(opts.moss){
    for(var m=0;m<TILE;m+=1){
      var mv=rnd(seedbase*2+m);
      if(mv>0.55){
        var mh=1+Math.floor(mv*3);
        pxRect(g,m,TILE-mh,1,mh, mv>0.8?C.mossHi:C.moss);
      }
    }
    // a few moss dabs mid-tile
    for(var md=0;md<5;md++){
      var mx=Math.floor(rnd(seedbase*5+md)*TILE), my=Math.floor(rnd(seedbase*9+md)*TILE);
      pxRect(g,mx,my,2,2, C.moss);
    }
  }
  if(opts.wet){
    // darker, glossy: overlay translucent wet sheen
    g.globalAlpha=0.32; pxRect(g,0,0,TILE,TILE,C.wet); g.globalAlpha=1;
    // highlight streaks
    for(var w=0;w<TILE;w+=1){
      if(rnd(seedbase*7+w)>0.85){ g.globalAlpha=0.5; pxRect(g,w,2+Math.floor(rnd(w)*4),1,6,C.steelHi); g.globalAlpha=1; }
    }
  }
  // top rim light
  g.globalAlpha=0.25; pxRect(g,0,0,TILE,1,C.stoneHi); g.globalAlpha=1;
  ATLAS[name]=c;
}

function buildSteelTile(name, base, hi, lo, opts){
  opts=opts||{};
  var c=makeCanvas(TILE,TILE), g=c.getContext('2d');
  pxRect(g,0,0,TILE,TILE, base);
  // horizontal plate seams
  pxRect(g,0,0,TILE,2, hi);
  pxRect(g,0,TILE-2,TILE,2, lo);
  pxRect(g,0,15,TILE,1, lo);
  pxRect(g,0,16,TILE,1, hi);
  // vertical subtle
  pxRect(g,0,0,1,TILE, lo);
  pxRect(g,TILE-1,0,1,TILE, lo);
  // rivets in corners + mid
  var rv=[[3,3],[TILE-4,3],[3,TILE-4],[TILE-4,TILE-4],[3,17],[TILE-4,17]];
  for(var i=0;i<rv.length;i++){
    pxRect(g,rv[i][0],rv[i][1],2,2,C.rivet);
    pxRect(g,rv[i][0],rv[i][1],1,1,C.steelHi);
  }
  if(opts.rust){
    for(var r=0;r<40;r++){
      var rx=Math.floor(rnd(r*1.7+1)*TILE), ry=Math.floor(rnd(r*2.3+2)*TILE);
      var rv2=rnd(r*3.1);
      pxRect(g,rx,ry,1+Math.floor(rv2*2),1+Math.floor(rv2*2), rv2>0.6?C.rustHi:C.rust);
    }
    // rust streaks from rivets
    for(var s=0;s<rv.length;s++){
      if(rnd(s*5)>0.4){ g.globalAlpha=0.6; pxRect(g,rv[s][0],rv[s][1]+2,1,4+Math.floor(rnd(s)*6),C.rust); g.globalAlpha=1; }
    }
  }
  if(opts.vent){
    // horizontal vent slots
    for(var v=8;v<TILE-6;v+=5){
      pxRect(g,6,v,TILE-12,2, C.steelDk);
      pxRect(g,6,v,TILE-12,1, C.inkDk);
      pxRect(g,6,v+2,TILE-12,1, C.steelHi);
    }
  }
  ATLAS[name]=c;
}

function buildGrateTile(){
  var c=makeCanvas(TILE,TILE), g=c.getContext('2d');
  pxRect(g,0,0,TILE,TILE, C.inkDk);
  pxRect(g,0,0,TILE,3, C.steelDk);
  // bars
  for(var x=2;x<TILE;x+=6){ pxRect(g,x,0,3,TILE, C.steel); pxRect(g,x,0,1,TILE, C.steelHi); pxRect(g,x+2,0,1,TILE,C.steelDk); }
  pxRect(g,0,0,TILE,2, C.steelHi);
  pxRect(g,0,TILE-2,TILE,2, C.steelDk);
  ATLAS['grate']=c;
}

function buildCrumbleTile(){
  var c=makeCanvas(TILE,TILE), g=c.getContext('2d');
  pxRect(g,0,0,TILE,TILE, C.rust);
  pxRect(g,0,0,TILE,3, C.rustHi);
  for(var i=0;i<50;i++){
    var x=Math.floor(rnd(i*1.3)*TILE), y=Math.floor(rnd(i*2.7)*TILE);
    pxRect(g,x,y,1+Math.floor(rnd(i)*2),1, rnd(i*5)>0.5?C.rustHi:C.steelDk);
  }
  // broken holes
  pxRect(g,7,10,4,3,C.inkDk); pxRect(g,20,18,5,4,C.inkDk); pxRect(g,14,24,3,3,C.inkDk);
  pxRect(g,0,TILE-3,TILE,3, C.steelDk);
  ATLAS['crumble']=c;
}

function buildPipeTiles(){
  // straight horizontal copper pipe (background deco / solid)
  var c=makeCanvas(TILE,TILE), g=c.getContext('2d');
  pxRect(g,0,0,TILE,TILE, C.bg1);
  pxRect(g,0,8,TILE,16, C.copperDk);
  pxRect(g,0,9,TILE,14, C.copper);
  pxRect(g,0,10,TILE,4, C.copperHi);
  pxRect(g,0,21,TILE,2, C.copperDk);
  // flanges
  pxRect(g,0,6,3,20, C.copperDk); pxRect(g,1,7,2,18,C.copper);
  pxRect(g,TILE-3,6,3,20, C.copperDk); pxRect(g,TILE-2,7,2,18,C.copper);
  ATLAS['pipeH']=c;

  // vertical steel pipe
  var c2=makeCanvas(TILE,TILE), g2=c2.getContext('2d');
  pxRect(g2,0,0,TILE,TILE, C.bg1);
  pxRect(g2,8,0,16,TILE, C.steelDk);
  pxRect(g2,9,0,14,TILE, C.pipeSteel);
  pxRect(g2,10,0,4,TILE, C.steelHi);
  pxRect(g2,21,0,2,TILE, C.steelDk);
  ATLAS['pipeV']=c2;
}

function buildBgArch(){
  // A far background arch silhouette tile (parallax layer 0)
  var c=makeCanvas(TILE*4,TILE*4), g=c.getContext('2d');
  g.clearRect(0,0,TILE*4,TILE*4);
  // arch
  g.fillStyle=C.bgFar;
  g.beginPath();
  g.moveTo(8,TILE*4);
  g.lineTo(8,40);
  g.arc(TILE*2,40,TILE*2-8,Math.PI,0,false);
  g.lineTo(TILE*4-8,TILE*4);
  g.closePath();
  g.fill();
  // inner darker
  g.fillStyle=C.bg0;
  g.beginPath();
  g.moveTo(16,TILE*4);
  g.lineTo(16,46);
  g.arc(TILE*2,46,TILE*2-16,Math.PI,0,false);
  g.lineTo(TILE*4-16,TILE*4);
  g.closePath();
  g.fill();
  ATLAS['arch']=c;
}

function buildChain(){
  var c=makeCanvas(8,TILE), g=c.getContext('2d');
  for(var y=0;y<TILE;y+=6){
    g.strokeStyle=C.steelDk; g.lineWidth=2;
    g.beginPath(); g.ellipse(4,y+3,2.5,3,0,0,Math.PI*2); g.stroke();
    g.strokeStyle=C.steel; g.lineWidth=1;
    g.beginPath(); g.ellipse(4,y+3,2.5,3,0,0,Math.PI*2); g.stroke();
  }
  ATLAS['chain']=c;
}

function buildLamp(){
  var c=makeCanvas(TILE,TILE), g=c.getContext('2d');
  // bracket
  pxRect(g,14,2,4,6,C.steelDk);
  // lamp housing
  pxRect(g,9,7,14,14,C.steelDk);
  pxRect(g,10,8,12,12,C.inkDk);
  pxRect(g,12,10,8,8,C.lamp);
  pxRect(g,13,11,6,6,C.lampGlow);
  pxRect(g,14,12,4,3,C.ink);
  ATLAS['lamp']=c;
}

/* ---------------------------------------------------------------
   4. MICK SPRITE ATLAS (32x48 frames)
   --------------------------------------------------------------- */
var MICK = {}; // name -> canvas (32x48)

function buildMick(){
  // Legend for Mick pixmaps
  var L = {
    o:C.overall, O:C.overallHi, d:C.overallDk,
    s:C.skin, k:C.skinDk,
    c:C.cap, C:C.capHi,
    b:C.boot, B:C.bootHi,
    w:C.wrench, W:C.wrenchHi, x:C.wrenchDk,
    m:C.stache, e:'#22303c', l:'#ffffff'
  };
  // Each frame is 16 wide x 24 tall then scaled x2 -> 32x48. Build at scale 2.
  var S=2;
  function frame(rows){
    var c=makeCanvas(32,48), g=c.getContext('2d');
    drawPixmap(g, rows, L, 0, 0, S);
    return c;
  }
  // 16x24 grid. Rows top(hat) to bottom(boots).
  // We'll keep a consistent body and vary limbs/wrench.
  // idle 1
  MICK.idle0 = frame([
    "                ",
    "     ccccc      ",
    "    cCCCCCc     ",
    "   cCcccccCc    ",
    "    sssssss     ",
    "   smsssms s    ",
    "   sseesee s    ",
    "   ssmmmmm s    ",
    "    smmmmm      ",
    "    ksssssk     ",
    "   dooooood     ",
    "  dOoooooOod    ",
    "  dOoooooOod    ",
    "  doOoooOood    ",
    "   dooooood     ",
    "   dosssod      ",
    "   sd   ds      ",
    "   sd   ds      ",
    "   kd   dk      ",
    "  bbb   bbb     ",
    " BbbbB BbbbB    ",
    " bbbbb bbbbb    ",
    "                ",
    "                "
  ]);
  // idle 1 (breath — cap up 1px done via same, tiny arm shift)
  MICK.idle1 = frame([
    "                ",
    "     ccccc      ",
    "    cCCCCCc     ",
    "   cCcccccCc    ",
    "    sssssss     ",
    "   smsssms s    ",
    "   sseesee s    ",
    "   ssmmmmm s    ",
    "    smmmmm      ",
    "    ksssssk     ",
    "   dooooood     ",
    "  dOoooooOod    ",
    "  dOoooooOod    ",
    "  doOoooOood    ",
    "   dooooood     ",
    "   dosssod      ",
    "   sd   ds      ",
    "   sd   ds      ",
    "   kd   dk      ",
    "   bbb bbb      ",
    "  BbbbBbbbB     ",
    "  bbbbbbbbb     ",
    "                ",
    "                "
  ]);
  // walk frames (4) — legs alternate
  function walkBody(legL, legR){
    return [
    "                ",
    "     ccccc      ",
    "    cCCCCCc     ",
    "   cCcccccCc    ",
    "    sssssss     ",
    "   smsssms s    ",
    "   sseesee s    ",
    "   ssmmmmm s    ",
    "    smmmmm      ",
    "    ksssssk     ",
    "   dooooood     ",
    "  dOoooooOod    ",
    "  dOoooooOod    ",
    "  doOoooOood    ",
    "   dooooood     ",
    "   dosssod      "
    ].concat(legL, legR);
  }
  MICK.walk0=frame(walkBody(
    ["   sd   ds      ","   sd    ds     ","   kd    dk     ","  bbb    bb     "],
    [" BbbbB   bbbB   ","                ","                ","                "]));
  MICK.walk1=frame(walkBody(
    ["    sd ds       ","    sddss       ","    kddk        ","   bbbb         "],
    ["  BbbbbB        ","                ","                ","                "]));
  MICK.walk2=frame(walkBody(
    ["   ds   sd      ","  ds    sd      ","  dk    ks      ","  bb    bbb     "],
    [" bbbB   BbbbB   ","                ","                ","                "]));
  MICK.walk3=frame(walkBody(
    ["      ds sd     ","      ssdds     ","       kddk     ","       bbbb     "],
    ["      BbbbbB    ","                ","                ","                "]));
  // run frames (4) — leaning forward; head shifts right, wrench trailing
  function runBody(legs){
    return [
    "                ",
    "      ccccc     ",
    "     cCCCCCc    ",
    "    cCcccccCc   ",
    "     sssssss    ",
    "    smsssms s   ",
    "    sseesee s   ",
    "    ssmmmmm s   ",
    "     smmmmm     ",
    "    ksssssk     ",

var SPR={};
function buildSprites(){
  // Gunk blob (24x20) 2 frames
  function blob(sq){
    var c=makeCanvas(24,20),g=c.getContext('2d');
    var L={g:C.slime,G:C.slimeHi,d:C.slimeDk,e:'#12301a',l:'#ffffff'};
    var rows= sq ? [
      "        ",
      "  gggg  ",
      " gGGGGg ",
      "gGGGGGGg",
      "gGeGGeGg",
      "gGGGGGGg",
      "gdGllGdg",
      " gdggdg ",
      "        "
    ] : [
      "   gg   ",
      "  gGGg  ",
      " gGGGGg ",
      "gGGGGGGg",
      "gGeGGeGg",
      "gGGllGGg",
      "gdGGGGdg",
      " gdggdg ",
      " d    d "
    ];
    drawPixmap(g,rows,L,0,0,3);
    return c;
  }
  SPR.blob0=blob(false); SPR.blob1=blob(true);

  // Drip slime (10x10) hanging + drop
  var dc=makeCanvas(12,16),dg=dc.getContext('2d');
  drawPixmap(dg,["ggg","gGg","gGg","gGg"," g "," G "],{g:C.slime,G:C.slimeHi},0,0,3);
  SPR.drip=dc;

  // Pipe crab (26x16)
  var cc=makeCanvas(30,18),cg=cc.getContext('2d');
  drawPixmap(cg,[
    "r      r ",
    " r    r  ",
    " RRRRRR  ",
    "RReRReRR ",
    "RRRRRRRR ",
    " R RR R  ",
    "r  RR  r "
  ],{r:C.rust,R:C.rustHi,e:'#12100a'},0,0,3);
  SPR.crab=cc;

  // Burst pipe spray puff (used with animation, drawn procedurally)
  // Rolling barrel (28x28)
  var bc=makeCanvas(28,28),bg=bc.getContext('2d');
  bg.fillStyle=C.copperDk; bg.beginPath(); bg.arc(14,14,13,0,Math.PI*2); bg.fill();
  bg.fillStyle=C.copper; bg.beginPath(); bg.arc(14,14,11,0,Math.PI*2); bg.fill();
  bg.fillStyle=C.copperHi; bg.beginPath(); bg.arc(11,11,4,0,Math.PI*2); bg.fill();
  bg.strokeStyle=C.copperDk; bg.lineWidth=2;
  bg.beginPath(); bg.moveTo(2,14); bg.lineTo(26,14); bg.stroke();
  bg.beginPath(); bg.moveTo(14,2); bg.lineTo(14,26); bg.stroke();
  SPR.barrel=bc;

  // Grinder fan (34x34)
  var gc=makeCanvas(36,36),gg=gc.getContext('2d');
  gg.fillStyle=C.steelDk; gg.beginPath(); gg.arc(18,18,17,0,Math.PI*2); gg.fill();
  gg.fillStyle=C.steel;
  for(var i=0;i<4;i++){
    gg.save(); gg.translate(18,18); gg.rotate(i*Math.PI/2);
    gg.beginPath(); gg.moveTo(0,0); gg.lineTo(-4,-16); gg.lineTo(6,-14); gg.closePath(); gg.fill();
    gg.restore();
  }
  gg.fillStyle=C.rivet; gg.beginPath(); gg.arc(18,18,4,0,Math.PI*2); gg.fill();
  SPR.fan=gc;

  // heart pickup (16x16)
  var hc=makeCanvas(16,16),hg=hc.getContext('2d');
  drawPixmap(hg,[" h h "," hHh ","hHHHh","hHHHh"," hHh ","  h  "],{h:C.heart,H:C.heartHi},1,1,2.5);
  SPR.heart=hc;

  // brass fitting collectible (16x16) — a hex nut
  var fc=makeCanvas(18,18),fg=fc.getContext('2d');
  fg.fillStyle=C.brass; fg.beginPath();
  for(var a=0;a<6;a++){ var an=a*Math.PI/3-Math.PI/6; var px=9+Math.cos(an)*8, py=9+Math.sin(an)*8; if(a===0)fg.moveTo(px,py); else fg.lineTo(px,py); }
  fg.closePath(); fg.fill();
  fg.fillStyle=C.goldHi; fg.beginPath();
  for(var a2=0;a2<6;a2++){ var an2=a2*Math.PI/3-Math.PI/6; var px2=9+Math.cos(an2)*5, py2=9+Math.sin(an2)*5; if(a2===0)fg.moveTo(px2,py2); else fg.lineTo(px2,py2); }
  fg.closePath(); fg.fill();
  fg.fillStyle=C.inkDk; fg.beginPath(); fg.arc(9,9,3,0,Math.PI*2); fg.fill();
  SPR.fitting=fc;
}

/* Valve wheel drawn procedurally (allows spin). */
function drawValveWheel(g,cx,cy,r,angle,col,colHi){
  g.save(); g.translate(cx,cy); g.rotate(angle);
  g.strokeStyle=col; g.lineWidth=Math.max(2,r*0.28);
  g.beginPath(); g.arc(0,0,r,0,Math.PI*2); g.stroke();
  g.strokeStyle=colHi; g.lineWidth=Math.max(1,r*0.14);
  g.beginPath(); g.arc(0,0,r,0,Math.PI*2); g.stroke();
  // spokes
  g.strokeStyle=col; g.lineWidth=Math.max(2,r*0.22);
  for(var i=0;i<4;i++){ g.save(); g.rotate(i*Math.PI/2); g.beginPath(); g.moveTo(0,0); g.lineTo(0,-r); g.stroke(); g.restore(); }
  // hub
  g.fillStyle=colHi; g.beginPath(); g.arc(0,0,r*0.28,0,Math.PI*2); g.fill();
  g.fillStyle='#222'; g.beginPath(); g.arc(0,0,r*0.12,0,Math.PI*2); g.fill();
  g.restore();
}

   6. THE LEVEL — ASCII tilemap, 3 zones
   Legend:
     ' ' empty
     '#' stone (auto-variant), '=' steel, 'B' background brick (deco solid? no -> deco)
     'x' cracked stone, 'v' vented steel, 'r' rusted steel, 'w' wet stone, 'o' mossy stone
     'G' grate (solid), 'C' crumble grate
     '|' vertical pipe deco (solid), '-' horiz pipe deco (solid)
     'L' wall lamp (deco), 'h' hanging chain (deco)
     '.' water (lethal or drainable per pit — see pit markers)
     'W' water surface tile (top of a body of water)
     Entities (occupy a tile as spawn, tile becomes empty):
       'P' player start
       'g' gunk blob, 's' drip-slime ceiling source, 'p' burst pipe, 'a' pipe crab (in pipe end),
       'f' grinder fan, 'b' barrel spawner, 'H' heart pickup, '*' brass fitting
       'R' DRAIN valve, 'U' FLOW valve, 'Y' GEYSER valve, 'K' checkpoint, 'M' master valve
       'T' teach signpost (auto-numbered), 'Z' zone banner marker
       '1' drain-pit water region (drainable), '2' basin fill region (flow), '3' geyser column marker
       'F' floating flow-platform start, 'D' drop/bottomless marker (visual pit bottom)
   Notes: rows are equal length; width in tiles = row length.
   --------------------------------------------------------------- */

// The three zones flow left→right. Total width ~ 260 tiles.

  var rows = [];
  // --- We construct zone by zone as column-segments then concatenate. ---
  // Height H=17. Row 0 = ceiling top.
  var H = 17;
  function blank(){ var a=[]; for(var i=0;i<H;i++)a.push(''); return a; }

  // Each segment: array of H strings; we append horizontally.
  function seg(strArr){ // strArr is H strings; normalize each row to the segment's max width
    if(strArr.length!==H) throw new Error('segment must be '+H+' rows, got '+strArr.length);
    var maxW=0, i;
    for(i=0;i<strArr.length;i++) if(strArr[i].length>maxW) maxW=strArr[i].length;
    // pad short rows with spaces (empty air) so the segment is a clean rectangle
    for(i=0;i<strArr.length;i++){
      while(strArr[i].length<maxW) strArr[i]=strArr[i]+' ';

/* ---------------------------------------------------------------
   7. LEVEL PARSER — turns ASCII into tile grid + entity list
   --------------------------------------------------------------- */
var KNOWN_CHARS = " #=BxvrwoGC|-Lh.WPgspafbH*RUYKMTZ123FD";

function parseLevel(rows){
  var h=rows.length, w=rows[0].length;
  // verify rectangular + known chars
  for(var y=0;y<h;y++){
    if(rows[y].length!==w) throw new Error('row '+y+' width '+rows[y].length+' != '+w);
    for(var x=0;x<w;x++){
      if(KNOWN_CHARS.indexOf(rows[y][x])<0) throw new Error('unknown char "'+rows[y][x]+'" at '+x+','+y);
    }
  }
  // tile grid: store a type + variant seed. Solid map is separate.
  var grid=[]; var deco=[]; var water=[]; var special=[];
  var entities=[];
  var teachN=0, zoneN=0;
  var playerStart={x:2*TILE,y:6*TILE};
  var drainRegions=[]; // list of {x0,y0,x1,y1} in tiles
  var basinRegions=[];
  var geyserCols=[];
  var flowPlatforms=[];
  var bottomless=[];
  for(var yy=0;yy<h;yy++){
    grid.push(new Array(w)); deco.push(new Array(w)); water.push(new Array(w)); special.push(new Array(w));
  }
  for(var Y=0;Y<h;Y++){
    for(var X=0;X<w;X++){
      var ch=rows[Y][X];
      var seed=(X*31+Y*17+7);
      switch(ch){
        case '#': grid[Y][X]=tileVariant('stone',seed); break;
        case 'x': grid[Y][X]={t:'stone',v:'crack'}; break;
        case 'o': grid[Y][X]={t:'stone',v:'moss'}; break;
        case 'w': grid[Y][X]={t:'stone',v:'wet'}; break;
        case '=': grid[Y][X]=tileVariant('steel',seed); break;
        case 'r': grid[Y][X]={t:'steel',v:'rust'}; break;
        case 'v': grid[Y][X]={t:'steel',v:'vent'}; break;
        case 'G': grid[Y][X]={t:'grate'}; break;
        case 'C': grid[Y][X]={t:'crumble'}; break; // crumble handled as entity too
        case '|': grid[Y][X]={t:'pipeV'}; break;
        case '-': grid[Y][X]={t:'pipeH'}; break;
        case 'B': deco[Y][X]='brick'; break;
        case 'L': deco[Y][X]='lamp'; break;
        case 'h': deco[Y][X]='chain'; break;
        case '.': water[Y][X]='lethal'; break;
        case 'W': water[Y][X]='surface'; break;
        case 'D': special[Y][X]='pit'; bottomless.push({x:X,y:Y}); break;
        case '1': special[Y][X]='drain'; break;
        case '2': special[Y][X]='basin'; break;
        case '3': special[Y][X]='geyser'; geyserCols.push({x:X,y:Y}); break;
        case 'P': playerStart={x:X*TILE, y:Y*TILE}; break;
        case 'g': entities.push({type:'blob', tx:X, ty:Y}); break;
        case 's': entities.push({type:'drip', tx:X, ty:Y}); break;
        case 'p': entities.push({type:'burst', tx:X, ty:Y}); break;
        case 'a': entities.push({type:'crab', tx:X, ty:Y}); break;
        case 'f': entities.push({type:'fan', tx:X, ty:Y}); break;
        case 'b': entities.push({type:'barrelSpawn', tx:X, ty:Y}); break;
        case 'H': entities.push({type:'heart', tx:X, ty:Y}); break;
        case '*': entities.push({type:'fitting', tx:X, ty:Y}); break;
        case 'R': entities.push({type:'valve', kind:'drain', tx:X, ty:Y}); break;
        case 'U': entities.push({type:'valve', kind:'flow', tx:X, ty:Y}); break;
        case 'Y': entities.push({type:'valve', kind:'geyser', tx:X, ty:Y}); break;
        case 'M': entities.push({type:'valve', kind:'master', tx:X, ty:Y}); break;
        case 'K': entities.push({type:'checkpoint', tx:X, ty:Y}); break;
        case 'F': flowPlatforms.push({tx:X, ty:Y}); break;
        case 'T': entities.push({type:'teach', tx:X, ty:Y, n:teachN++}); break;
        case 'Z': entities.push({type:'zonebanner', tx:X, ty:Y, n:zoneN++}); break;
        default: break; // space
      }
    }
  }
  // Collect drain / basin regions as bounding boxes (contiguous rectangles are fine for our use).
  function collectRegions(kind){
    var regs=[];
    var seen=[];
    for(var y=0;y<h;y++){ seen.push(new Array(w)); }
    for(var y2=0;y2<h;y2++) for(var x2=0;x2<w;x2++){
      if(special[y2][x2]===kind && !seen[y2][x2]){
        // flood-fill bounding box
        var stack=[[x2,y2]]; var minx=x2,maxx=x2,miny=y2,maxy=y2;
        var cells=[];
        while(stack.length){
          var p=stack.pop(); var px=p[0], py=p[1];
          if(px<0||py<0||px>=w||py>=h) continue;
          if(seen[py][px]||special[py][px]!==kind) continue;
          seen[py][px]=1; cells.push([px,py]);
          if(px<minx)minx=px; if(px>maxx)maxx=px; if(py<miny)miny=py; if(py>maxy)maxy=py;
          stack.push([px+1,py]); stack.push([px-1,py]); stack.push([px,py+1]); stack.push([px,py-1]);
        }
        regs.push({x0:minx,y0:miny,x1:maxx,y1:maxy,cells:cells});
      }
    }
    return regs;
  }
  drainRegions=collectRegions('drain');
  basinRegions=collectRegions('basin');

  return {
    rows:rows, w:w, h:h, grid:grid, deco:deco, water:water, special:special,
    entities:entities, playerStart:playerStart,
    drainRegions:drainRegions, basinRegions:basinRegions,
    geyserCols:geyserCols, flowPlatforms:flowPlatforms, bottomless:bottomless,
    teachCount:teachN, zoneCount:zoneN
  };
}

function tileVariant(t,seed){
  var r=rnd(seed);
  if(t==='stone'){ return {t:'stone', v: r>0.85?'crack' : r>0.7?'moss' : 'clean'}; }
  if(t==='steel'){ return {t:'steel', v: r>0.85?'rust' : 'clean'}; }
  return {t:t, v:'clean'};
}

/* Is the tile at grid coord solid for collision? */
function tileSolid(L, tx, ty){
  if(tx<0||ty<0||tx>=L.w||ty>=L.h) return tx<0 || tx>=L.w ; // walls at horizontal bounds; open top/bottom
  var g=L.grid[ty][tx];
  if(!g) return false;
  switch(g.t){
    case 'stone': case 'steel': case 'grate': case 'pipeV': case 'pipeH': return true;
    case 'crumble': return true; // crumble solid until it falls (entity toggles)
    default: return false;
  }
}

/* ---------------------------------------------------------------
   8. AUDIO — bgm + synthesized SFX
   --------------------------------------------------------------- */
var Audio2 = {
  ctx:null, master:null, started:false, muted:false, bgm:null, bgmEl:null,
  beat:0, beatTime:0,
  init:function(){
    if(this.ctx) return;
    try{
      var AC = window.AudioContext || window.webkitAudioContext;
      this.ctx = new AC();
      this.master = this.ctx.createGain();
      this.master.gain.value = 0.5;
      this.master.connect(this.ctx.destination);
    }catch(e){ this.ctx=null; }
  },
  startMusic:function(){
    if(this.started) return;
    this.started=true;
    this.bgmEl = document.getElementById('bgm');
    if(this.bgmEl){
      this.bgmEl.volume = this.muted?0:0.55;
      var p=this.bgmEl.play();
      if(p&&p.catch) p.catch(function(){});
    }
  },
  setMuted:function(m){
    this.muted=m;
    if(this.master) this.master.gain.value = m?0:0.5;
    if(this.bgmEl) this.bgmEl.volume = m?0:0.55;
  },
  // soft fade at loop seam: fade out last 0.4s, fade in first 0.4s
  updateMusic:function(){
    if(!this.bgmEl||this.muted) return;
    var el=this.bgmEl;
    if(!el.duration||isNaN(el.duration)) return;
    var t=el.currentTime, d=el.duration, fade=0.4, base=0.55;
    var v=base;
    if(t>d-fade) v=base*Math.max(0,(d-t)/fade);
    else if(t<fade) v=base*(t/fade);
    el.volume=v;
  },
  sfx:function(type){
    if(!this.ctx||this.muted) return;
    var ctx=this.ctx, now=ctx.currentTime, m=this.master;
    function tone(freq,dur,typ,vol,slideTo){
      var o=ctx.createOscillator(), g=ctx.createGain();
      o.type=typ||'square'; o.frequency.setValueAtTime(freq,now);
      if(slideTo) o.frequency.exponentialRampToValueAtTime(Math.max(20,slideTo), now+dur);
      g.gain.setValueAtTime(0.0001,now);
      g.gain.exponentialRampToValueAtTime(vol||0.15, now+0.008);
      g.gain.exponentialRampToValueAtTime(0.0001, now+dur);
      o.connect(g); g.connect(m); o.start(now); o.stop(now+dur+0.02);
    }
    function noise(dur,vol,filterFreq){
      var len=Math.floor(ctx.sampleRate*dur);
      var buf=ctx.createBuffer(1,len,ctx.sampleRate);
      var d=buf.getChannelData(0);
      for(var i=0;i<len;i++) d[i]=(Math.random()*2-1)*(1-i/len);
      var src=ctx.createBufferSource(); src.buffer=buf;
      var f=ctx.createBiquadFilter(); f.type='bandpass'; f.frequency.value=filterFreq||1000;
      var g=ctx.createGain(); g.gain.value=vol||0.12;
      src.connect(f); f.connect(g); g.connect(m); src.start(now);
    }
    switch(type){
      case 'jump':   tone(320,0.16,'square',0.14,620); break;
      case 'stomp':  tone(220,0.09,'square',0.16,90); noise(0.08,0.08,600); break;
      case 'whack':  noise(0.06,0.14,1800); tone(500,0.05,'square',0.10,300); break;
      case 'ratchet':tone(900,0.03,'square',0.09); break;
      case 'splash': noise(0.22,0.12,700); tone(180,0.15,'sine',0.07,120); break;
      case 'hurt':   tone(300,0.25,'sawtooth',0.16,90); break;
      case 'coin':   tone(880,0.06,'square',0.11); tone(1320,0.09,'square',0.10); break;
      case 'heart':  tone(660,0.08,'sine',0.12,990); tone(990,0.12,'sine',0.10); break;
      case 'geyser': noise(0.4,0.10,500); tone(140,0.4,'sine',0.06,200); break;
      case 'fanfare':
        [523,659,784,1046].forEach(function(f,i){ setTimeout(function(){ tone(f,0.28,'square',0.13); }, i*130); });
        break;
      case 'crumble':noise(0.3,0.10,300); break;
      case 'geyseron': tone(200,0.3,'sine',0.08,500); noise(0.3,0.08,400); break;
    }
  }
};

var Input = {
  left:false, right:false, down:false, jump:false, jumpHeld:false, run:false, wrench:false,
  jumpEdge:false, wrenchHeld:false, anyGesture:false,
  _prevJump:false
};
function bindKeys(){
  var down={};
  window.addEventListener('keydown', function(e){
    var k=e.key.toLowerCase();
    if(['arrowleft','arrowright','arrowup','arrowdown',' ','spacebar'].indexOf(k)>=0) e.preventDefault();
    down[k]=true; updateFromKeys();
    Input.anyGesture=true;
    if(k==='p') togglePause();
    if(k==='m') toggleMute();
    handleMenuKey(k);
  });
  window.addEventListener('keyup', function(e){ down[e.key.toLowerCase()]=false; updateFromKeys(); });
  function updateFromKeys(){
    Input.left = !!(down['arrowleft']||down['a']);
    Input.right= !!(down['arrowright']||down['d']);
    Input.down = !!(down['arrowdown']||down['s']);
    Input.jumpHeld = !!(down[' ']||down['spacebar']||down['arrowup']||down['w']);
    Input.run  = !!(down['shift']);
    Input.wrenchHeld = !!(down['j']);
  }
}

/* Touch controls: left D-pad (◀ ▶ ▼), right JUMP + WRENCH(=RUN when moving) */
var touchState={ left:false,right:false,down:false,jump:false,wrench:false };
function buildTouch(){
  var root=document.getElementById('touch');
  var isTouch = ('ontouchstart' in window) || navigator.maxTouchPoints>0;
  function mk(id,label,cls){ var b=document.createElement('div'); b.className='tbtn '+(cls||''); b.textContent=label; b.dataset.k=id; root.appendChild(b); return b; }
  var bL=mk('left','◀'); var bR=mk('right','▶'); var bD=mk('down','▼');
  var bJ=mk('jump','JUMP','round'); var bW=mk('wrench','⚡','round');
  function layout(){
    var vw=window.innerWidth, vh=window.innerHeight;
    var sz=Math.max(56, Math.min(84, Math.floor(vw*0.15)));
    var pad=14, baseY=vh-pad-sz;
    bL.style.width=bL.style.height=sz+'px'; bL.style.left=pad+'px'; bL.style.top=baseY+'px';
    bR.style.width=bR.style.height=sz+'px'; bR.style.left=(pad+sz+8)+'px'; bR.style.top=baseY+'px';
    bD.style.width=bD.style.height=sz+'px'; bD.style.left=(pad+Math.floor(sz*0.5)+4)+'px'; bD.style.top=(baseY-sz-8)+'px';
    var bigJ=Math.floor(sz*1.15);
    bJ.style.width=bJ.style.height=bigJ+'px'; bJ.style.left=(vw-pad-bigJ)+'px'; bJ.style.top=(vh-pad-bigJ)+'px';
    bW.style.width=bW.style.height=sz+'px'; bW.style.left=(vw-pad-bigJ-sz-8)+'px'; bW.style.top=(vh-pad-sz-Math.floor(sz*0.35))+'px';
    bJ.style.fontSize=Math.floor(bigJ*0.22)+'px'; bW.style.fontSize=Math.floor(sz*0.42)+'px';
    [bL,bR,bD].forEach(function(b){ b.style.fontSize=Math.floor(sz*0.4)+'px'; });
  }
  layout(); window.addEventListener('resize',layout);
  function press(b,on){ var k=b.dataset.k; touchState[k]=on; if(on)b.classList.add('press'); else b.classList.remove('press'); }
  [bL,bR,bD,bJ,bW].forEach(function(b){
    b.addEventListener('touchstart',function(e){ e.preventDefault(); press(b,true); Input.anyGesture=true; onFirstGesture(); },{passive:false});
    b.addEventListener('touchend',function(e){ e.preventDefault(); press(b,false); },{passive:false});
    b.addEventListener('touchcancel',function(e){ e.preventDefault(); press(b,false); },{passive:false});
    // pointer fallback for testing on desktop
    b.addEventListener('mousedown',function(e){ e.preventDefault(); press(b,true); Input.anyGesture=true; onFirstGesture(); });
    b.addEventListener('mouseup',function(e){ e.preventDefault(); press(b,false); });
    b.addEventListener('mouseleave',function(e){ if(touchState[b.dataset.k]) press(b,false); });
  });
  if(isTouch){ root.classList.add('on'); }
  return isTouch;
}

  world={
    enemies:[], drips:[], bursts:[], crabs:[], fans:[], barrels:[], barrelSpawns:[],

    teachSeen:{}, valveSeen:{}, bannerShown:{}, curZone:0,
    winStage:0, winCrankHold:0, winFlood:0
  };

  // instantiate entities
  L.entities.forEach(function(e){
    var wx=e.tx*TILE, wy=e.ty*TILE;
    switch(e.type){
      case 'blob': world.enemies.push({kind:'blob', x:wx+4, y:wy+8, w:24, h:24, vx:-40, dir:-1, alive:true, animT:0}); break;
      case 'drip': world.drips.push({tx:e.tx, ty:e.ty, x:wx+TILE/2, y:wy+TILE, phase:'idle', t:Math.random()*2, dropY:0, dropVy:0, slickT:0}); break;
      case 'burst': world.bursts.push({x:wx, y:wy, w:TILE, h:TILE, dir:1, cycle:Math.random()*2, spraying:false, patched:false, hp:1}); break;
      case 'crab': world.crabs.push({x:wx, y:wy+8, dir:-1, ext:0, phase:'in', t:Math.random()*2, alive:true, w:26, h:16}); break;
      case 'fan': world.fans.push({x:wx+16, y:wy+16, r:15, spin:0, speed:0, cyc:Math.random()*3}); break;

      case 'fitting': world.fittings.push({x:wx+8, y:wy+8, w:16, h:16, got:false, bob:Math.random()*6}); fittingsTotal++; break;
