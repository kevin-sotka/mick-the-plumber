      case 'valve':
        world.valves.push({
          kind:e.kind, x:wx, y:wy, tx:e.tx, ty:e.ty,
          angle:0, turning:false, turned:false, hold:0, cool:0,
          drainTimer:0, refillWarn:0, // for drain
          w:TILE, h:TILE, seen:false
        });
        break;
    }
  });
  world.fittingsTotal=fittingsTotal;

  // drain regions -> state (drained flag + refill timer + baseline water top)
  world.drainState = L.drainRegions.map(function(r){
    return { r:r, drained:false, timer:0, level:1, valveIdx:-1 };
  });
  // basin regions -> state (fill 0..1)
  world.basinState = L.basinRegions.map(function(r){ return { r:r, fill:0 }; });
  // flow platforms
  world.flowPlats = L.flowPlatforms.map(function(p){
    return { x:p.tx*TILE, y:p.ty*TILE, baseY:p.ty*TILE, w:TILE, h:12, riding:false };
  });
  // geyser columns grouped by x
  var geyCols={};
  L.geyserCols.forEach(function(g){ if(!geyCols[g.x])geyCols[g.x]={x:g.x, y0:g.y, y1:g.y}; else { geyCols[g.x].y0=Math.min(geyCols[g.x].y0,g.y); geyCols[g.x].y1=Math.max(geyCols[g.x].y1,g.y);} });
  world.geyserState = Object.keys(geyCols).map(function(k){ return geyCols[k]; });

  // crumble tiles -> entities
  for(var y=0;y<L.h;y++) for(var x=0;x<L.w;x++){
    if(L.grid[y][x] && L.grid[y][x].t==='crumble'){
      world.crumbles.push({tx:x, ty:y, state:'solid', t:0});
    }
  }

  // link nearest drain region to each drain valve
  world.valves.forEach(function(v,vi){
    if(v.kind==='drain'){
      var best=-1, bd=1e9;
      world.drainState.forEach(function(ds,di){
        var cx=(ds.r.x0+ds.r.x1)/2, dist=Math.abs(cx-v.tx);
        if(dist<bd){ bd=dist; best=di; }
      });
      if(best>=0) world.drainState[best].valveIdx=vi;
    }
  });
}

/* ---------------------------------------------------------------
   12. COLLISION — AABB vs tile grid with drained/crumble awareness
   --------------------------------------------------------------- */
function solidAt(px,py){ // pixel coords -> is solid?
  var tx=Math.floor(px/TILE), ty=Math.floor(py/TILE);
  if(tx<0||tx>=L.w) return true;      // side walls
  if(ty<0) return false;              // open ceiling above grid
  if(ty>=L.h) return false;           // open below (fall out)
  var g=L.grid[ty][tx];
  if(!g) return false;
  if(g.t==='crumble'){
    // check crumble state
    for(var i=0;i<world.crumbles.length;i++){
      var c=world.crumbles[i];
      if(c.tx===tx && c.ty===ty) return (c.state!=='gone');
    }
    return true;
  }
  return tileSolid(L,tx,ty);
}

// Move an AABB (x,y,w,h) by dx,dy resolving against tiles. Returns collision flags.
function moveAndCollide(box, dx, dy){
  var res={left:false,right:false,up:false,down:false};
  // Horizontal first
  box.x += dx;
  if(dx!==0){
    var dir = dx>0?1:-1;
    var edge = dir>0 ? box.x+box.w : box.x;
    var t0=Math.floor(box.y/TILE), t1=Math.floor((box.y+box.h-1)/TILE);
    for(var ty=t0;ty<=t1;ty++){
      if(solidAt(edge, ty*TILE+2)){
        var tx=Math.floor(edge/TILE);
        if(dir>0){ box.x = tx*TILE - box.w - 0.001; res.right=true; }
        else { box.x = (tx+1)*TILE + 0.001; res.left=true; }
        break;
      }
    }
  }
  // Vertical
  box.y += dy;
  if(dy!==0){
    var vdir = dy>0?1:-1;
    var vedge = vdir>0 ? box.y+box.h : box.y;
    var x0=Math.floor(box.x/TILE), x1=Math.floor((box.x+box.w-1)/TILE);
    for(var xx=x0;xx<=x1;xx++){
      if(solidAt(xx*TILE+2, vedge)){
        var tyy=Math.floor(vedge/TILE);
        if(vdir>0){ box.y = tyy*TILE - box.h - 0.001; res.down=true; }
        else { box.y = (tyy+1)*TILE + 0.001; res.up=true; }
        break;
      }
    }
  }
  return res;
}

/* Support: also collide with dynamic flow platforms (one-way top). */
function collideFlowPlatforms(p, prevBottom){
  world.flowPlats.forEach(function(fp){
    if(p.vy<0) return;
    var pb=p.y+p.h;
    if(p.x+p.w>fp.x+2 && p.x<fp.x+fp.w-2){
      if(prevBottom<=fp.y+2 && pb>=fp.y && pb<=fp.y+18){
        p.y=fp.y-p.h; p.vy=0; p.grounded=true; fp.riding=true;
      }
    }
  });
}

/* ---------------------------------------------------------------
   13. PHYSICS STEP (player)
   --------------------------------------------------------------- */
function updatePlayer(dt){
  var p=player;
  if(!p.alive) return;

  // gather input (merge keyboard + touch)
  var IL = Input.left||touchState.left;
  var IR = Input.right||touchState.right;
  var ID = Input.down||touchState.down;
  var IjumpHeld = Input.jumpHeld||touchState.jump;
  var Iwrench = Input.wrenchHeld||touchState.wrench;
  // On mobile, WRENCH doubles as RUN while moving:
  var IRun = Input.run || (Iwrench && (IL||IR));

  // jump edge detection
  var jumpPressed = IjumpHeld && !p.jumpHeld;
  p.jumpHeld = IjumpHeld;

  // If cranking a valve, lock movement
  if(p.cranking){
    p.vx=0;
    return; // valve system drives crank; handled in updateValves
  }

  // ---- horizontal ----
  var accel=PHYS.WALK_ACCEL;
  var maxSpeed = IRun ? lerp(PHYS.WALK_MAX, PHYS.RUN_MAX, clamp(p.runCharge/PHYS.RUN_RAMP,0,1)) : PHYS.WALK_MAX;
  // charge run meter
  if(IRun && (IL||IR) && p.grounded) p.runCharge=Math.min(PHYS.RUN_RAMP, p.runCharge+dt);
  else if(!IRun) p.runCharge=Math.max(0, p.runCharge-dt*1.6);

  var slickMul = p.onSlick>0 ? 0.3 : 1;

  if(p.sliding){
    // slide: keep momentum, decelerate slowly
    p.slideT-=dt;
    p.vx -= Math.sign(p.vx)*Math.min(Math.abs(p.vx), 600*dt);
    if(p.slideT<=0 || Math.abs(p.vx)<40 || !p.grounded){ p.sliding=false; }
  } else if(ID && p.grounded && Math.abs(p.vx)>PHYS.SKID_THRESH && (IL||IR)===false){
    // slide trigger handled below via input transitions; keep here as guard
  } else {
    var dirWanted = (IR?1:0) - (IL?1:0);
    if(dirWanted!==0 && !p.ducking){
      // skid check: reversing above threshold
      if(Math.sign(p.vx)!==0 && Math.sign(p.vx)!==dirWanted && Math.abs(p.vx)>PHYS.SKID_THRESH){
        p.skidding=true;
        p.vx += dirWanted*PHYS.SKID_DECEL*dt;
        if(Math.sign(p.vx)===dirWanted || Math.abs(p.vx)<10){ p.skidding=false; }
        // dust
        if(Math.random()<0.6) spawnDust(p.x+p.w/2, p.y+p.h, -dirWanted);
      } else {
        p.skidding=false;
        p.vx += dirWanted*accel*slickMul*dt;
        if(p.vx>maxSpeed) p.vx=Math.max(maxSpeed, p.vx-accel*dt);
        if(p.vx<-maxSpeed) p.vx=Math.min(-maxSpeed, p.vx+accel*dt);
      }
      p.facing=dirWanted;
    } else {
      // friction
      p.skidding=false;
      var fr=PHYS.FRICTION*slickMul;
      if(p.vx>0) p.vx=Math.max(0,p.vx-fr*dt);
      else if(p.vx<0) p.vx=Math.min(0,p.vx+fr*dt);
    }
    // clamp to max when not skidding
    if(!p.skidding){
      if(p.vx>maxSpeed) p.vx=maxSpeed;
      if(p.vx<-maxSpeed) p.vx=-maxSpeed;
    }
  }

  // ducking
  var wantDuck = ID && p.grounded && !p.sliding;
  if(wantDuck && !p.ducking){
    // if moving fast -> slide
    if(Math.abs(p.vx)>PHYS.SKID_THRESH){
      p.sliding=true; p.slideT=PHYS.SLIDE_TIME;
    } else {
      p.ducking=true;
    }
  }
  if(!ID) p.ducking=false;
  var targetH = (p.ducking||p.sliding) ? PHYS.DUCK_H : PHYS.STAND_H;
  if(targetH!==p.h){
    var feet=p.y+p.h; p.h=targetH; p.y=feet-p.h; // keep feet planted
  }
  if(p.ducking||p.sliding) p.vx = p.sliding? p.vx : p.vx*Math.pow(0.0001,dt*0); // ducking allows some slide

  // ---- jump ----
  p.coyote = p.grounded ? PHYS.COYOTE : Math.max(0,p.coyote-dt);
  if(jumpPressed) p.jumpBuf=PHYS.JUMP_BUFFER; else p.jumpBuf=Math.max(0,p.jumpBuf-dt);
  var justJumped=false;
  if(p.jumpBuf>0 && p.coyote>0 && !p.sliding){
    var jv = (p.runCharge>0.5||Math.abs(p.vx)>PHYS.WALK_MAX+20) ? PHYS.JUMP_V_RUN : PHYS.JUMP_V_WALK;
    p.vy=jv; p.jumping=true; p.grounded=false; p.coyote=0; p.jumpBuf=0;
    p.ducking=false; justJumped=true;
    Audio2.sfx('jump');
    spawnDust(p.x+p.w/2, p.y+p.h, 0);
  }
  // variable jump gravity. On the launch frame, give one clean frame of impulse
  // before gravity bites (crisper launch; lifts apex to the intended ~90px band).
  var grav=PHYS.GRAVITY;
  if(p.jumping && p.vy<0 && IjumpHeld) grav=PHYS.JUMP_GRAV;
  if(!IjumpHeld && p.vy<0) p.jumping=false;
  if(!justJumped) p.vy += grav*dt;
  if(p.vy>PHYS.TERMINAL) p.vy=PHYS.TERMINAL;

  // ---- integrate with substepping ----
  var speed=Math.max(Math.abs(p.vx),Math.abs(p.vy));
  var steps=1;
  if(speed>SUBSTEP_SPEED) steps=Math.ceil(speed/SUBSTEP_SPEED);
  steps=Math.min(steps,6);
  var sdt=dt/steps;
  p.wasGrounded=p.grounded;
  p.grounded=false;
  for(var s=0;s<steps;s++){
    var prevBottom=p.y+p.h;
    var box={x:p.x,y:p.y,w:p.w,h:p.h};
    var col=moveAndCollide(box, p.vx*sdt, p.vy*sdt);
    p.x=box.x; p.y=box.y;
    if(col.down){ p.vy=0; p.grounded=true; }
    if(col.up){ p.vy=0; p.jumping=false; }
    if(col.left||col.right){ p.vx=0; }
    collideFlowPlatforms(p, prevBottom);
  }

  // landing squash
  if(p.grounded && !p.wasGrounded){
    p.squash=PHYS.SQUASH;
    Audio2.sfx('stomp'); // subtle land tick reuse; soft
    spawnDust(p.x+p.w/2, p.y+p.h, 0);
    if(Math.abs(p.vy)>0){}
  }
  if(p.squash>0) p.squash-=dt;

  // slick decay
  if(p.onSlick>0) p.onSlick-=dt;

  // iframe
  if(p.iframe>0) p.iframe-=dt;

  // ---- hazards: water/pits ----
  var footTx=Math.floor((p.x+p.w/2)/TILE), footTy=Math.floor((p.y+p.h)/TILE);
  // lethal water or bottomless if fully submerged center
  var cTx=Math.floor((p.x+p.w/2)/TILE), cTy=Math.floor((p.y+p.h*0.6)/TILE);
  if(cTy>=0 && cTy<L.h && cTx>=0 && cTx<L.w){
    var wt=L.water[cTy][cTx];
    if(wt==='lethal'){ hurtByPit(); }
    // drainable region: lethal only if not drained
    if(L.special[cTy][cTx]==='drain'){
      var ds=findDrainStateAt(cTx,cTy);
      if(ds && !ds.drained){ hurtByPit(); }
    }
    if(L.special[cTy][cTx]==='pit'){ hurtByPit(); }
  }
  // fall out of bottom of world
  if(p.y>L.h*TILE+40){ hurtByPit(); }

  // ---- animation state ----
  updatePlayerAnim(dt, IL, IR);

  // camera look-ahead follows facing; runwind lines
  if(Math.abs(p.vx)>PHYS.RUN_MAX-30) spawnWind(p);
}

function findDrainStateAt(tx,ty){
  for(var i=0;i<world.drainState.length;i++){
    var r=world.drainState[i].r;
    if(tx>=r.x0&&tx<=r.x1&&ty>=r.y0&&ty<=r.y1) return world.drainState[i];
  }
  return null;
}

function hurtByPit(){
  if(!player.alive) return;
  loseHeart(true);
}

function updatePlayerAnim(dt, IL, IR){
  var p=player;
  p.animT+=dt;
  var newAnim;
  if(p.hurtT>0){ newAnim='hurt'; p.hurtT-=dt; }
  else if(p.cranking){ newAnim='crank'; }
  else if(p.whackT>0){ newAnim='whack'; p.whackT-=dt; }
  else if(!p.grounded){ newAnim = p.vy<0 ? 'jump':'fall'; }
  else if(p.sliding){ newAnim='slide'; }
  else if(p.ducking){ newAnim='duck'; }
  else if(p.skidding){ newAnim='skid'; }
  else if(Math.abs(p.vx)>PHYS.WALK_MAX+10){ newAnim='run'; }
  else if(Math.abs(p.vx)>12){ newAnim='walk'; }
  else newAnim='idle';
  if(newAnim!==p.anim){ p.anim=newAnim; p.animT=0; p.animFrame=0; }
  // frame timing
  var spd=Math.abs(p.vx);
  var rate = p.anim==='run'? 0.07 : p.anim==='walk'? Math.max(0.07,0.16-spd/2000) : 0.35;
  p.animFrame = Math.floor(p.animT/rate);
}

/* ---------------------------------------------------------------
   14. PARTICLES / TEXT
   --------------------------------------------------------------- */
function spawnDust(x,y,dir){
  for(var i=0;i<4;i++){
    world.particles.push({ x:x, y:y, vx:(Math.random()-0.5)*40 + dir*30, vy:-Math.random()*40-10,
      life:0.35, max:0.35, r:2+Math.random()*2, col:'#cfc9b8', grav:120 });
  }
}
function spawnWind(p){
  if(Math.random()<0.4){
    world.particles.push({ x:p.x+(p.facing>0?-4:p.w+4), y:p.y+8+Math.random()*20,
      vx:-p.facing*180, vy:0, life:0.18, max:0.18, r:1, col:'#dfe8ef', line:true });
  }
}
function spawnSplash(x,y,col){
  for(var i=0;i<10;i++){
    world.particles.push({ x:x, y:y, vx:(Math.random()-0.5)*140, vy:-Math.random()*160-40,
      life:0.5, max:0.5, r:2+Math.random()*2, col:col||C.waterHi, grav:400 });
  }
}
function spawnBurstFX(x,y,col){
  for(var i=0;i<12;i++){
    var a=Math.random()*Math.PI*2, sp=40+Math.random()*120;
    world.particles.push({ x:x, y:y, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp,
      life:0.5, max:0.5, r:2+Math.random()*3, col:col||'#dfe8ef', grav:200 });
  }
}
function floatText(x,y,txt,col){
  world.floatText.push({x:x,y:y,txt:txt,col:col||C.gold,life:1.0,max:1.0});
}
function updateParticles(dt){
  for(var i=world.particles.length-1;i>=0;i--){
    var pt=world.particles[i];
    pt.life-=dt; if(pt.life<=0){ world.particles.splice(i,1); continue; }
    pt.x+=pt.vx*dt; pt.y+=pt.vy*dt;
    if(pt.grav) pt.vy+=pt.grav*dt;
  }
  for(var j=world.floatText.length-1;j>=0;j--){
    var f=world.floatText[j]; f.life-=dt; f.y-=18*dt; if(f.life<=0) world.floatText.splice(j,1);
  }
  if(world.shake>0) world.shake-=dt*8;
}

/* ---------------------------------------------------------------
   15. HEARTS / DAMAGE / RESPAWN
   --------------------------------------------------------------- */
function loseHeart(fromPit){
  var p=player;
  if(p.iframe>0 && !fromPit) return;
  hud.hearts--;
  Audio2.sfx('hurt');
  world.shake=1;
  if(hud.hearts<=0){
    // Game over -> respawn at checkpoint with hearts restored, -500 score. Kind.
    respawnAtCheckpoint(true);
  } else {
    if(fromPit){
      respawnAtCheckpoint(false);
    } else {
      // knockback + iframes
      p.iframe=PHYS.IFRAME; p.hurtT=0.4;
      p.vx = -p.facing*PHYS.KNOCK_X; p.vy=PHYS.KNOCK_Y; p.grounded=false;
    }
  }
}
function respawnAtCheckpoint(gameover){
  var p=player;
  if(gameover){ hud.hearts=3; hud.score=Math.max(0,hud.score-500); floatText(p.x,p.y-30,'-500',C.red); }
  p.x=p.spawnX; p.y=p.spawnY; p.vx=0; p.vy=0; p.grounded=false; p.iframe=1.2; p.hurtT=0;
  p.ducking=false; p.sliding=false; p.h=PHYS.STAND_H; p.runCharge=0;
  cam.x=Math.max(0,p.x-BASE_W/2); cam.lookX=0;
}

/* ---------------------------------------------------------------
   16. ENEMIES & OBSTACLES UPDATE
   --------------------------------------------------------------- */
function aabb(a,b){ return a.x<b.x+b.w && a.x+a.w>b.x && a.y<b.y+b.h && a.y+a.h>b.y; }
function pbox(){ return {x:player.x,y:player.y,w:player.w,h:player.h}; }

function updateEnemies(dt){
  var p=player, pb=pbox();
  // gunk blobs
  world.enemies.forEach(function(en){
    if(!en.alive) return;
    en.animT+=dt;
    en.x+=en.vx*dt;
    // edge / wall turn
    var aheadX = en.dir>0 ? en.x+en.w+2 : en.x-2;
    var footY=en.y+en.h+2;
    if(!solidAt(aheadX,footY) || solidAt(aheadX,en.y+en.h-6)){
      en.dir*=-1; en.vx=Math.abs(en.vx)*en.dir; en.x+=en.dir*2;
    }
    // gravity to keep grounded
    var by=en.y+en.h;
    if(!solidAt(en.x+en.w/2,by+2)){ en.y+=60*dt; }
    // collide with player
    if(aabb(pb,en)){
      if(p.vy>60 && p.y+p.h < en.y+en.h*0.6){ // stomp
        en.alive=false; p.vy=PHYS.STOMP_BOUNCE; p.jumping=true;
        Audio2.sfx('stomp'); addScore(100,en.x,en.y,'+100'); stats.kills++;
        spawnBurstFX(en.x+en.w/2,en.y+en.h/2,C.slimeHi);
      } else if(p.whackT>0 && Math.abs((p.x+p.w/2)-(en.x+en.w/2))<40){
        en.alive=false; Audio2.sfx('whack'); addScore(100,en.x,en.y,'+100'); stats.kills++;
        spawnBurstFX(en.x+en.w/2,en.y+en.h/2,C.slimeHi);
      } else if(p.iframe<=0){ loseHeart(false); }
    }
  });

  // drip slimes
  world.drips.forEach(function(d){
    d.t+=dt;
    if(d.phase==='idle'){ if(d.t>2.2){ d.phase='telegraph'; d.t=0; } }
    else if(d.phase==='telegraph'){ if(d.t>1){ d.phase='drop'; d.dropY=d.y; d.dropVy=0; d.t=0; } }
    else if(d.phase==='drop'){
      d.dropVy+=1600*dt; d.dropY+=d.dropVy*dt;
      // hit floor?
      if(solidAt(d.x, d.dropY+6)){
        // splat -> slick
        d.phase='idle'; d.t=0;
        var stx=Math.floor(d.x/TILE), sty=Math.floor((d.dropY+6)/TILE);
        world.slickTiles.push({tx:stx, ty:sty, life:2.0});
        spawnSplash(d.x,d.dropY,C.slimeHi);
        Audio2.sfx('splash');
      }
      // hit player
      if(Math.abs((p.x+p.w/2)-d.x)<10 && p.y<d.dropY+8 && p.y+p.h>d.dropY-8 && p.iframe<=0){
        loseHeart(false); d.phase='idle'; d.t=0;
      }
      if(d.dropY>L.h*TILE){ d.phase='idle'; d.t=0; }
    }
  });
  // slick tiles decay + apply
  for(var si=world.slickTiles.length-1;si>=0;si--){
    var sl=world.slickTiles[si]; sl.life-=dt;
    if(sl.life<=0){ world.slickTiles.splice(si,1); continue; }
    if(Math.floor((p.x+p.w/2)/TILE)===sl.tx && Math.floor((p.y+p.h)/TILE)===sl.ty && p.grounded){ p.onSlick=Math.max(p.onSlick,0.2); }
  }

  // burst pipes
  world.bursts.forEach(function(b){
    if(b.patched) return;
    b.cycle+=dt;
    b.spraying = (b.cycle%2)<1.0;
    // whack to patch
    var bb={x:b.x,y:b.y,w:b.w,h:b.h};
    if(p.whackT>0 && Math.abs((p.x+p.w/2)-(b.x+b.w/2))<44 && Math.abs((p.y+p.h/2)-(b.y+b.h/2))<40){
      b.patched=true; Audio2.sfx('whack'); addScore(200,b.x,b.y,'+200'); stats.patches++;
      spawnBurstFX(b.x+b.w,b.y+b.h/2,'#dfe8ef');
    }
    // spray hurts
    if(b.spraying){
      var sprayBox={x:b.x+b.dir*TILE, y:b.y+6, w:TILE*2, h:TILE-12};
      if(aabb(pb,sprayBox) && p.iframe<=0){ loseHeart(false); }
    }
  });

  // pipe crabs
  world.crabs.forEach(function(cr){
    if(!cr.alive) return;
    cr.t+=dt;
    if(cr.phase==='in'){ if(cr.t>1.6){ cr.phase='out'; cr.t=0; } cr.ext=Math.max(0,cr.ext-dt*80); }
    else { cr.ext=Math.min(20,cr.ext+dt*80); if(cr.t>1.2){ cr.phase='in'; cr.t=0; } }
    var crb={x:cr.x-cr.ext, y:cr.y, w:cr.w, h:cr.h};
    if(cr.phase==='out' && cr.ext>10){
      if(p.whackT>0 && Math.abs((p.x+p.w/2)-(crb.x+crb.w/2))<40){
        cr.alive=false; Audio2.sfx('whack'); addScore(150,cr.x,cr.y,'+150'); stats.kills++;
        spawnBurstFX(cr.x,cr.y,C.rustHi);
      } else if(aabb(pb,crb) && p.iframe<=0){ loseHeart(false); }
    }
  });

  // grinder fans
  world.fans.forEach(function(fn){
    fn.cyc+=dt;
    var phase=(fn.cyc%4);
    fn.speed = phase<2.5 ? 8 : 1.5; // fast then slow window
    fn.spin+=fn.speed*dt;
    var fb={x:fn.x-fn.r, y:fn.y-fn.r, w:fn.r*2, h:fn.r*2};
    if(aabb(pb,fb) && p.iframe<=0 && fn.speed>4){ loseHeart(false); }
  });

  // barrel spawners
  world.barrelSpawns.forEach(function(bs){
    bs.t+=dt;
    if(bs.t>=bs.interval){ bs.t=0;
      world.barrels.push({x:bs.x, y:bs.y, w:26, h:26, vx:-90, vy:0, spin:0, alive:true});
    }
  });
  // barrels
  for(var bi=world.barrels.length-1;bi>=0;bi--){
    var ba=world.barrels[bi];
    ba.spin+=ba.vx*dt*0.06;
    ba.vy+=2000*dt; if(ba.vy>700)ba.vy=700;
    var box={x:ba.x,y:ba.y,w:ba.w,h:ba.h};
    var col=moveAndCollide(box, ba.vx*dt, 0);
    ba.x=box.x; if(col.left||col.right){ // break on wall
      spawnBurstFX(ba.x+ba.w/2,ba.y+ba.h/2,C.copperHi); world.barrels.splice(bi,1); continue; }
    var box2={x:ba.x,y:ba.y,w:ba.w,h:ba.h};
    var col2=moveAndCollide(box2,0,ba.vy*dt);
    ba.y=box2.y; if(col2.down)ba.vy=0;
    // player interaction
    var bab={x:ba.x,y:ba.y,w:ba.w,h:ba.h};
    if(aabb(pb,bab)){
      if(p.sliding || (p.ducking)){ /* slide under: if player low enough, no hit */
        if(p.y+p.h - (ba.y) > 8){ /* overlapping vertically enough -> break barrel */ }
      }
      if(p.vy>60 && p.y+p.h<ba.y+10){ p.vy=PHYS.STOMP_BOUNCE; spawnBurstFX(ba.x+ba.w/2,ba.y,C.copperHi); world.barrels.splice(bi,1); continue; }
      else if(!(p.sliding && p.y+p.h < ba.y+ba.h) && p.iframe<=0){
        // if sliding and low, dodge; else hit
        if(!(p.sliding)) loseHeart(false);
      }
    }
    if(ba.y>L.h*TILE){ world.barrels.splice(bi,1); }
  }

  // crumble grates
  world.crumbles.forEach(function(cm){
    if(cm.state==='gone'){ cm.t+=dt; if(cm.t>3){ cm.state='solid'; cm.t=0; } return; }
    if(cm.state==='shaking'){ cm.t+=dt; if(cm.t>0.5){ cm.state='gone'; cm.t=0; Audio2.sfx('crumble'); spawnBurstFX(cm.tx*TILE+16,cm.ty*TILE+16,C.rustHi); } return; }
    // solid: if player standing on it
    var onTop = Math.abs((player.y+player.h)-(cm.ty*TILE))<4 &&
                (player.x+player.w>cm.tx*TILE+2)&&(player.x<cm.tx*TILE+TILE-2) && player.grounded;
    if(onTop){ cm.state='shaking'; cm.t=0; }
  });

  // geyser jet (carries player up)
  updateGeyser(dt);

  // pickups
  world.pickups.forEach(function(pk){
    if(pk.got) return; pk.bob+=dt;
    var b={x:pk.x-8,y:pk.y-8+Math.sin(pk.bob*3)*3,w:16,h:16};
    if(aabb(pb,b)){ pk.got=true;
      if(pk.kind==='heart'){ if(hud.hearts<3)hud.hearts++; Audio2.sfx('heart'); floatText(pk.x,pk.y-10,'+HEART',C.heartHi); }
    }
  });
  // fittings
  world.fittings.forEach(function(ft){
    if(ft.got) return; ft.bob+=dt;
    var b={x:ft.x-8,y:ft.y-8+Math.sin(ft.bob*3)*3,w:16,h:16};
    if(aabb(pb,b)){ ft.got=true; hud.fittings++; stats.fittings++; Audio2.sfx('coin'); addScore(50,ft.x,ft.y,'+50'); }
  });
}

/* Geyser: when valve turned, geyser cycles 3s on / 1s off; jet carries player up */
function updateGeyser(dt){
  var p=player;
  world.valves.forEach(function(v){
    if(v.kind!=='geyser'||!v.turned) return;
    v.drainTimer+=dt; // reuse as cycle timer
    var cyc=v.drainTimer%4;
    v.active = cyc<3;
    // find geyser column (nearest to valve, but columns are at fixed x)
    world.geyserState.forEach(function(gc){
      var colX=gc.x*TILE, topY=gc.y0*TILE, botY=(gc.y1+1)*TILE;
      gc.on=v.active;
      if(v.active){
        // churn particles
        if(Math.random()<0.6) world.particles.push({x:colX+8+Math.random()*16,y:botY-Math.random()*20,vx:(Math.random()-0.5)*30,vy:-200-Math.random()*100,life:0.6,max:0.6,r:2,col:C.foam,grav:100});
        // lift player if standing in column x-range and within jet height
        if(p.x+p.w>colX+2 && p.x<colX+TILE-2 && p.y+p.h>topY && p.y+p.h<botY+8){
          p.vy=-260; p.grounded=false; p.jumping=false;
        }
      }
    });
  });
}

function addScore(n,x,y,label){
  hud.score+=n;
  if(label) floatText(x,y-8,label,C.gold);
}

/* ---------------------------------------------------------------
   17. VALVES + WATER SYSTEMS
   --------------------------------------------------------------- */
function updateValves(dt){
  var p=player;
  var Iwrench = Input.wrenchHeld||touchState.wrench;
  var near=null, nearDist=1e9;
  world.valves.forEach(function(v){
    if(v.kind==='flow' && v.turned) return; // permanent
    var vx=v.x+TILE/2, vy=v.y+TILE/2;
    var d=Math.abs((p.x+p.w/2)-vx)+Math.abs((p.y+p.h/2)-vy);
    if(d<48 && Math.abs((p.y+p.h)-(v.y+TILE))<40){ if(d<nearDist){ nearDist=d; near=v; } }
  });
  world.nearValve=near;

  if(near){
    near.seen=true; world.valveSeen[near.kind]=true;
  }

  // cranking
  if(near && Iwrench && p.grounded){
    p.cranking=near; near.turning=true;
    var speed = near.kind==='master' ? 1/2.4 : 1/0.6; // master is slower/dramatic
    near.hold+=dt;
    near.angle+=dt*10;
    if(Math.floor(near.hold*8)!==Math.floor((near.hold-dt)*8)) Audio2.sfx('ratchet');
    p.crankT+=dt;
    // completion
    if(near.kind==='master'){
      updateMaster(dt, near, Iwrench);
    } else if(near.hold>=0.6 && !near.turned){
      completeValve(near);
    }
  } else {
    if(p.cranking){ p.cranking.turning=false; }
    p.cranking=null;
    world.valves.forEach(function(v){ if(!v.turned && v.kind!=='master'){ v.hold=Math.max(0,v.hold-dt*0.5); } });
  }

  // drain refill timers
  world.drainState.forEach(function(ds){
    if(ds.drained){
      ds.timer-=dt;
      // warning: water rising in last 3s
      if(ds.timer<3){ ds.level = 1-(ds.timer/3); } else { ds.level=0; }
      if(ds.timer<=0){ ds.drained=false; ds.level=1;
        // splash + reset the valve so it can be turned again
        if(ds.valveIdx>=0){ var v=world.valves[ds.valveIdx]; v.turned=false; v.hold=0; v.angle=0; }
        spawnSplash((ds.r.x0+ds.r.x1)/2*TILE+16, ds.r.y0*TILE+8, C.waterHi);
      }
    }
  });
}

function completeValve(v){
  v.turned=true; v.hold=0.6; Audio2.sfx('ratchet');
  player.cranking=null; player.crankT=0;
  world.shake=0.6;
  if(v.kind==='drain'){
    // find its drain region
    world.drainState.forEach(function(ds){
      if(ds.valveIdx>=0 && world.valves[ds.valveIdx]===v){
        ds.drained=true; ds.timer=12; ds.level=0;
        Audio2.sfx('splash');
        // glug bubbles
        for(var i=0;i<16;i++) spawnSplash((ds.r.x0+ds.r.x1)/2*TILE+16, ds.r.y1*TILE, C.waterHi);
        floatText(v.x, v.y-16, 'DRAINED! 12s', C.waterHi);
      }
    });
  } else if(v.kind==='flow'){
    Audio2.sfx('geyseron');
    floatText(v.x, v.y-16, 'BASIN FILLING', C.waterHi);
  } else if(v.kind==='geyser'){
    v.drainTimer=0; Audio2.sfx('geyser');
    floatText(v.x, v.y-16, 'GEYSER ON', C.foam);
  }
}

/* Basin fill + flow platform rise (continuous while flow valve open) */
function updateWaterSystems(dt){
  // basin fill
  var flowOpen=false;
  world.valves.forEach(function(v){ if(v.kind==='flow'&&v.turned) flowOpen=true; });
  world.basinState.forEach(function(bs){
    if(flowOpen && bs.fill<1){ bs.fill=Math.min(1,bs.fill+dt*0.18); if(Math.random()<0.3){ var r=bs.r; spawnSplash((r.x0+r.x1)/2*TILE+16, (r.y1)*TILE, C.waterHi);} }
    // ride flow platform up with the fill
    world.flowPlats.forEach(function(fp){
      var ftx=Math.floor(fp.x/TILE), fty=Math.floor(fp.baseY/TILE);
      if(ftx>=bs.r.x0-1&&ftx<=bs.r.x1+1){
        var topY=bs.r.y0*TILE, botY=(bs.r.y1+1)*TILE;
        fp.y = botY - fp.h - bs.fill*(botY-topY-fp.h);
      }
    });
  });
}

/* Master valve 3-stage crank */
function updateMaster(dt, v, held){
  if(!held){ world.winCrankHold=Math.max(0,world.winCrankHold-dt*0.5); return; }
  world.winCrankHold+=dt;
  v.angle+=dt*8;
  world.shake=0.4;
  if(Math.floor(world.winCrankHold*6)!==Math.floor((world.winCrankHold-dt)*6)) Audio2.sfx('ratchet');
  // 3 stages, each ~0.9s
  var stage=Math.floor(world.winCrankHold/0.9);
  if(stage>world.winStage && stage<=3){
    world.winStage=stage; world.shake=1; Audio2.sfx('geyseron');
    floatText(v.x, v.y-20-stage*10, 'STAGE '+stage+'!', C.gold);
  }
  if(world.winStage>=3){
    triggerWin();
  }
}
function triggerWin(){
  if(STATE==='win') return;
  STATE='win'; player.victory=true; player.anim='victory'; player.winTimer=0;
  Audio2.sfx('fanfare');
  // final stats
  stats.endTime=globalTime;
  stats.timeSec=Math.max(0, (stats.endTime-stats.startTime));
  stats.bonus = hud.hearts*500 + Math.max(0, 3000-Math.floor(stats.timeSec)*10);
  hud.score+=stats.bonus;
}

/* ---------------------------------------------------------------
   18. CHECKPOINTS, TEACH SIGNS, BANNERS, IDLE ARROW
   --------------------------------------------------------------- */
function updateCheckpoints(dt){
  var p=player;
  world.checkpoints.forEach(function(c){
    if(c.flash>0)c.flash-=dt;
    var cx=c.x+TILE/2;
    if(!c.active && Math.abs((p.x+p.w/2)-cx)<TILE && Math.abs((p.y+p.h)-(c.y+TILE))<TILE){
      c.active=true; c.flash=1; Audio2.sfx('ratchet');
      p.spawnX=c.x; p.spawnY=c.y+TILE-PHYS.STAND_H-4;
      hud.hearts=3; // refill at checkpoint (kind)
      floatText(c.x, c.y-16, 'CHECKPOINT!', C.slimeHi);
    }
  });
  // teach signs reveal when near
  world.teaches.forEach(function(t){
    var near=Math.abs((p.x+p.w/2)-(t.x+TILE/2))<TILE*3;
    t.alpha = near ? Math.min(1,t.alpha+dt*3) : Math.max(0,t.alpha-dt*2);
  });
  // zone banners
  world.banners.forEach(function(b){
    if(!b.triggered && p.x+p.w/2 > b.x-BASE_W/2){
      b.triggered=true; b.timer=2.6; world.curZone=b.n+1;
    }
    if(b.timer>0)b.timer-=dt;
  });
  // idle arrow
  var moving = Math.abs(p.vx)>10 || Input.left||Input.right||touchState.left||touchState.right||!p.grounded;
  if(moving) idleTimer=0; else idleTimer+=dt;
}

/* ---------------------------------------------------------------
   19. WRENCH WHACK (attack) — triggered on wrench tap when not near valve
   --------------------------------------------------------------- */
var prevWrench=false;
function updateWhack(dt){
  var Iwrench = Input.wrenchHeld||touchState.wrench;
  var pressed = Iwrench && !prevWrench;
  prevWrench=Iwrench;
  if(pressed && !player.cranking && !world.nearValve){
    player.whackT=0.24;
    Audio2.sfx('whack');
  }
}

/* ---------------------------------------------------------------
   20. CAMERA
   --------------------------------------------------------------- */
function updateCamera(dt){
  var p=player;
  var targetLook = p.facing*60;
  cam.lookX += (targetLook-cam.lookX)*Math.min(1,dt*4);
  var tx = p.x+p.w/2 - BASE_W/2 + cam.lookX;
  var ty = p.y+p.h/2 - BASE_H/2;
  // smooth follow, clamp to level bounds
  cam.x += (tx-cam.x)*Math.min(1,dt*8);
  cam.y += (ty-cam.y)*Math.min(1,dt*6);
  cam.x=clamp(cam.x, 0, L.w*TILE-BASE_W);
  cam.y=clamp(cam.y, -TILE, L.h*TILE-BASE_H);
}

/* ---------------------------------------------------------------
   21. RENDER
   --------------------------------------------------------------- */
var canvas, ctx;
function initCanvas(){
  canvas=document.getElementById('game');
  ctx=canvas.getContext('2d',{alpha:false});
  canvas.width=BASE_W; canvas.height=BASE_H;
  ctx.imageSmoothingEnabled=false;
  resizeCanvas();
  window.addEventListener('resize',resizeCanvas);
}
function resizeCanvas(){
  var vw=window.innerWidth, vh=window.innerHeight;
  var scale=Math.max(1, Math.floor(Math.min(vw/BASE_W, vh/BASE_H)*2)/2); // allow .5 steps
  if(scale<1) scale=Math.min(vw/BASE_W,vh/BASE_H);
  var cw=BASE_W*scale, chh=BASE_H*scale;
  if(cw>vw||chh>vh){ scale=Math.min(vw/BASE_W,vh/BASE_H); cw=BASE_W*scale; chh=BASE_H*scale; }
  canvas.style.width=cw+'px'; canvas.style.height=chh+'px';
}

function beatTimeNow(){ // song-synced when playing, wall clock otherwise
  var el=document.getElementById('bgm');
  if(el && !el.paused && el.currentTime>0) return el.currentTime-0.046;
  return globalTime;
}
function beatPulse(){ // 0..1 pulse on 92 BPM
  var beatLen=60/PHYS.BPM;
  var ph=(beatTimeNow()%beatLen)/beatLen;
  return 0.5+0.5*Math.cos(ph*Math.PI*2);
}
function measureBlink(){ // sharp 0..1 flash on the downbeat of every 4-beat measure
  var beatLen=60/PHYS.BPM, measLen=beatLen*4;
  var t=beatTimeNow(); if(t<0) t+=measLen;
  var ph=(t%measLen)/measLen;
  return ph<0.22 ? Math.pow(1-ph/0.22,2) : 0;
}

function render(){
  var g=ctx;
  var sx = world&&world.shake>0 ? (Math.random()-0.5)*world.shake*8 : 0;
  var sy = world&&world.shake>0 ? (Math.random()-0.5)*world.shake*8 : 0;
  g.save();
  // background gradient
  var grd=g.createLinearGradient(0,0,0,BASE_H);
  grd.addColorStop(0,C.bg0); grd.addColorStop(1,C.bgFar);
  g.fillStyle=grd; g.fillRect(0,0,BASE_W,BASE_H);

  if(STATE==='title'){ drawTitle(g); g.restore(); return; }
  if(STATE==='howto'){ drawHowTo(g); g.restore(); return; }

  g.translate(sx,sy);
  drawParallax(g);
  drawLevel(g);
  drawWaterAndSpecial(g);
  drawEntities(g);
  drawPlayer(g);
  drawParticles(g);
  drawForeground(g);
  g.restore();

  drawHUD(g);
  drawSigns(g);
  if(STATE==='win') drawWin(g);
  if(STATE==='paused') drawPause(g);
}

/* Parallax: 3 layers */
function drawParallax(g){
  // far arches (0.25x)
  var arch=ATLAS.arch;
  if(arch){
    var pxl=-(cam.x*0.25)%(arch.width);
    for(var x=pxl-arch.width;x<BASE_W;x+=arch.width){
      g.globalAlpha=0.5; g.drawImage(arch,Math.floor(x),BASE_H-arch.height-10); g.globalAlpha=1;
    }
  }
  // mid stonework band (0.5x) + chains
  g.globalAlpha=0.35;
  var mo=-(cam.x*0.5)%128;
  for(var mx=mo-128;mx<BASE_W;mx+=128){
    g.fillStyle=C.bg2; g.fillRect(Math.floor(mx),40,60,BASE_H-60);
    g.fillStyle=C.bg1; g.fillRect(Math.floor(mx)+60,60,40,BASE_H-80);
    // chain
    if(ATLAS.chain){ g.drawImage(ATLAS.chain, Math.floor(mx)+30, 30); }
  }
  g.globalAlpha=1;
}

/* Draw the tile grid within camera view */
function drawLevel(g){
  var x0=Math.floor(cam.x/TILE)-1, x1=Math.ceil((cam.x+BASE_W)/TILE)+1;
  var y0=Math.floor(cam.y/TILE)-1, y1=Math.ceil((cam.y+BASE_H)/TILE)+1;
  for(var ty=Math.max(0,y0);ty<Math.min(L.h,y1);ty++){
    for(var tx=Math.max(0,x0);tx<Math.min(L.w,x1);tx++){
      var cell=L.grid[ty][tx];
      var dx=Math.floor(tx*TILE-cam.x), dy=Math.floor(ty*TILE-cam.y);
      if(cell){
        var atl=tileAtlasFor(cell);
        if(atl) g.drawImage(atl,dx,dy);
      }
      // deco
      var d=L.deco[ty][tx];
      if(d==='lamp' && ATLAS.lamp){
        g.drawImage(ATLAS.lamp,dx,dy);
        // warm glow pool: soft per-beat pulse + bright blink every 4 beats
        var pulse=0.45+0.15*beatPulse()+0.55*measureBlink();
        var rg=g.createRadialGradient(dx+16,dy+16,4,dx+16,dy+16,40);
        rg.addColorStop(0,'rgba(255,190,87,'+(0.35*pulse)+')'); rg.addColorStop(1,'rgba(255,190,87,0)');
        g.fillStyle=rg; g.fillRect(dx-24,dy-24,80,80);
      } else if(d==='chain' && ATLAS.chain){ g.drawImage(ATLAS.chain,dx+12,dy); }
      else if(d==='brick'){ g.fillStyle=C.bg1; g.fillRect(dx,dy,TILE,TILE); }
    }
  }
  // crumble shake offset overlay
  world.crumbles.forEach(function(cm){
    if(cm.state==='shaking'){
      var dx=Math.floor(cm.tx*TILE-cam.x)+(Math.random()-0.5)*3, dy=Math.floor(cm.ty*TILE-cam.y);
      if(ATLAS.crumble) g.drawImage(ATLAS.crumble,Math.floor(dx),dy);
    } else if(cm.state==='gone'){
      // draw empty (nothing)
    }
  });
  // slime drips sliding down stone (cosmetic motif) — a few animated seams
  drawSlimeMotif(g,x0,x1,y0,y1);
}

function tileAtlasFor(cell){
  if(cell.t==='stone'){
    if(cell.v==='crack') return ATLAS.stoneCrack;
    if(cell.v==='moss') return ATLAS.stoneMoss;
    if(cell.v==='wet') return ATLAS.stoneWet;
    return ATLAS.stone;
  }
  if(cell.t==='steel'){
    if(cell.v==='rust') return ATLAS.steelRust;
    if(cell.v==='vent') return ATLAS.steelVent;
    return ATLAS.steel;
  }
  if(cell.t==='grate') return ATLAS.grate;
  if(cell.t==='crumble') return ATLAS.crumble;
  if(cell.t==='pipeV') return ATLAS.pipeV;
  if(cell.t==='pipeH') return ATLAS.pipeH;
  return null;
}

function drawSlimeMotif(g,x0,x1,y0,y1){
  // Deterministic slime drips at certain columns on wet/mossy stone seams.
  for(var tx=Math.max(0,x0);tx<Math.min(L.w,x1);tx++){
    if((tx*7)%13===0){
      var cell=L.grid[Math.max(0,Math.min(L.h-1,Math.floor(cam.y/TILE)+2))]&&L.grid[Math.floor(cam.y/TILE)+2] ? null:null;
      // find a wall column: draw a slow slime drip animation
      var seed=tx*3.7;
      var yBase=(Math.floor(cam.y/TILE)+2)*TILE;
      var slidePos=(globalTime*8+seed*40)% (BASE_H);
      var dx=Math.floor(tx*TILE-cam.x)+ (Math.floor(rnd(seed)*20));
      if(dx<0||dx>BASE_W) continue;
      // only draw if there's stone at that column near top of view
      var cty=Math.floor(cam.y/TILE)+1;
      if(cty>=0&&cty<L.h&&L.grid[cty][tx]&&L.grid[cty][tx].t==='stone'){
        var dy=(cty+1)*TILE-cam.y;
        g.fillStyle=C.slimeDk; g.fillRect(dx,dy,2,10);
        g.fillStyle=C.slime; g.fillRect(dx,dy+(slidePos%24),2,4);
        g.fillStyle=C.slimeHi; g.fillRect(dx,dy+(slidePos%24),1,2);
      }
    }
  }
}

/* Water bodies, drainable pits (with level), basins, geyser, pits */
function drawWaterAndSpecial(g){
  var x0=Math.floor(cam.x/TILE)-1, x1=Math.ceil((cam.x+BASE_W)/TILE)+1;
  var y0=Math.floor(cam.y/TILE)-1, y1=Math.ceil((cam.y+BASE_H)/TILE)+1;
  // lethal + surface water tiles
  for(var ty=Math.max(0,y0);ty<Math.min(L.h,y1);ty++){
    for(var tx=Math.max(0,x0);tx<Math.min(L.w,x1);tx++){
      var w=L.water[ty][tx];
      if(w){
        var dx=Math.floor(tx*TILE-cam.x), dy=Math.floor(ty*TILE-cam.y);
        drawWaterCell(g,dx,dy,tx,ty, w==='surface');
      }
    }
  }
  // bottomless pits (dark shafts)
  for(var ty2=Math.max(0,y0);ty2<Math.min(L.h,y1);ty2++){
    for(var tx2=Math.max(0,x0);tx2<Math.min(L.w,x1);tx2++){
      if(L.special[ty2][tx2]==='pit'){
        var dx2=Math.floor(tx2*TILE-cam.x), dy2=Math.floor(ty2*TILE-cam.y);
        var grd=g.createLinearGradient(0,dy2,0,dy2+TILE);
        grd.addColorStop(0,'#0a1018'); grd.addColorStop(1,'#000');
        g.fillStyle=grd; g.fillRect(dx2,dy2,TILE,TILE);
      }
    }
  }
  // drainable regions
  world.drainState.forEach(function(ds){
    var r=ds.r;
    var topPix=r.y0*TILE, botPix=(r.y1+1)*TILE, fullH=botPix-topPix;
    var waterH;
    if(!ds.drained){ waterH=fullH; }
    else { waterH= ds.level*fullH; } // rises from 0 as timer runs low
    var dx=Math.floor(r.x0*TILE-cam.x), dyTop=Math.floor((botPix-waterH)-cam.y);
    var wpx=(r.x1-r.x0+1)*TILE;
    if(waterH>0){
      g.fillStyle='rgba(46,134,171,0.72)';
      g.fillRect(dx,dyTop,wpx,Math.floor(waterH));
      // surface line
      g.fillStyle=C.waterHi; g.fillRect(dx,dyTop,wpx,2);
      // animated wobble
      for(var wx=0;wx<wpx;wx+=6){ var wob=Math.sin((globalTime*4)+(wx*0.3))*1.5; g.fillStyle=C.foam; g.fillRect(dx+wx,Math.floor(dyTop+wob),3,1); }
    }
    // draining bubbles
    if(ds.drained && ds.timer>3){
      if(Math.random()<0.5){ var bx=dx+Math.random()*wpx; g.fillStyle=C.foam; g.fillRect(Math.floor(bx),Math.floor(botPix-cam.y-Math.random()*10),2,2); }
    }
    // countdown ring drawn near linked valve
  });
  // basin water
  world.basinState.forEach(function(bs){
    var r=bs.r; if(bs.fill<=0) return;
    var topPix=r.y0*TILE, botPix=(r.y1+1)*TILE, fullH=botPix-topPix;
    var wh=bs.fill*fullH;
    var dx=Math.floor(r.x0*TILE-cam.x), dyTop=Math.floor((botPix-wh)-cam.y);
    var wpx=(r.x1-r.x0+1)*TILE;
    g.fillStyle='rgba(46,134,171,0.7)'; g.fillRect(dx,dyTop,wpx,Math.floor(wh));
    g.fillStyle=C.waterHi; g.fillRect(dx,dyTop,wpx,2);
  });
  // geyser jets
  world.geyserState.forEach(function(gc){
    if(!gc.on) return;
    var colX=Math.floor(gc.x*TILE-cam.x), topY=Math.floor(gc.y0*TILE-cam.y), botY=Math.floor((gc.y1+1)*TILE-cam.y);
    g.fillStyle='rgba(87,182,214,0.55)'; g.fillRect(colX+6,topY,TILE-12,botY-topY);
    g.fillStyle=C.foam;
    for(var yy=topY;yy<botY;yy+=6){ var wob=Math.sin(globalTime*20+yy*0.2)*3; g.fillRect(colX+10+wob,yy,TILE-20,3); }
  });
}

function drawWaterCell(g,dx,dy,tx,ty,surface){
  g.fillStyle='rgba(28,85,112,0.85)';
  g.fillRect(dx,dy,TILE,TILE);
  g.fillStyle='rgba(46,134,171,0.4)';
  g.fillRect(dx,dy,TILE,TILE);
  if(surface){
    var wob=Math.sin(globalTime*3+tx*0.6)*1.5;
    g.fillStyle=C.waterHi; g.fillRect(dx,dy+Math.floor(wob),TILE,2);
    g.fillStyle=C.foam;
    for(var i=0;i<TILE;i+=8){ g.fillRect(dx+i,dy+Math.floor(Math.sin(globalTime*4+i)*1.5),3,1); }
    // occasional bubble
    if(rnd(tx*3+Math.floor(globalTime*2))>0.7){ g.fillStyle=C.foam; g.fillRect(dx+ (Math.floor(rnd(tx)*TILE)),dy+8+ (Math.floor(globalTime*10)%16),2,2); }
  }
}

/* Entities render */
function drawEntities(g){
  // fittings
  world.fittings.forEach(function(ft){ if(ft.got)return; var dx=ft.x-cam.x-9, dy=ft.y-cam.y-9+Math.sin(ft.bob*3)*3; if(SPR.fitting)g.drawImage(SPR.fitting,Math.floor(dx),Math.floor(dy)); });
  // hearts
  world.pickups.forEach(function(pk){ if(pk.got)return; var dx=pk.x-cam.x-8, dy=pk.y-cam.y-8+Math.sin(pk.bob*3)*3; if(SPR.heart)g.drawImage(SPR.heart,Math.floor(dx),Math.floor(dy)); });
  // blobs
  world.enemies.forEach(function(en){ if(!en.alive)return; var f=Math.floor(en.animT*4)%2? SPR.blob1:SPR.blob0; var dx=en.x-cam.x, dy=en.y-cam.y; if(f)g.drawImage(f,Math.floor(dx),Math.floor(dy)); });
  // drips
  world.drips.forEach(function(d){
    var dx=d.x-cam.x, dyTop=d.ty*TILE+TILE-cam.y;
    if(d.phase==='telegraph'){ var grow=Math.min(6,d.t*8); g.fillStyle=C.slime; g.fillRect(Math.floor(dx-2),Math.floor(dyTop),4,grow); g.fillStyle=C.slimeHi; g.fillRect(Math.floor(dx-1),Math.floor(dyTop),2,2); }
    else if(d.phase==='drop'){ if(SPR.drip)g.drawImage(SPR.drip,Math.floor(dx-6),Math.floor(d.dropY-cam.y)); }
    else { g.fillStyle=C.slimeDk; g.fillRect(Math.floor(dx-1),Math.floor(dyTop),2,3); }
  });
  // burst pipes
  world.bursts.forEach(function(b){
    var dx=b.x-cam.x, dy=b.y-cam.y;
    // pipe body
    g.fillStyle=b.patched?C.steel:C.rust; g.fillRect(Math.floor(dx)+4,Math.floor(dy)+8,TILE-8,TILE-16);
    g.fillStyle=C.steelDk; g.fillRect(Math.floor(dx)+4,Math.floor(dy)+8,TILE-8,3);
    if(b.patched){ g.fillStyle=C.steelHi; g.fillRect(Math.floor(dx)+8,Math.floor(dy)+12,TILE-16,4); }
    if(!b.patched && b.spraying){
      var sxp=dx+TILE*b.dir;
      for(var i=0;i<8;i++){ var yy=dy+8+Math.random()*(TILE-16); var xx=sxp+ (b.dir>0?Math.random()*TILE*2:-(Math.random()*TILE*2)); g.fillStyle=i%2?C.foam:C.waterHi; g.fillRect(Math.floor(xx),Math.floor(yy),2+Math.random()*2,2); }
    }
  });
  // crabs
  world.crabs.forEach(function(cr){ if(!cr.alive)return; var dx=cr.x-cr.ext-cam.x, dy=cr.y-cam.y; if(SPR.crab)g.drawImage(SPR.crab,Math.floor(dx),Math.floor(dy)); });
  // fans
  world.fans.forEach(function(fn){ var dx=fn.x-cam.x, dy=fn.y-cam.y; g.save(); g.translate(Math.floor(dx),Math.floor(dy)); g.rotate(fn.spin); g.translate(-18,-18); if(SPR.fan)g.drawImage(SPR.fan,0,0); g.restore(); });
  // barrels
  world.barrels.forEach(function(ba){ var dx=ba.x-cam.x, dy=ba.y-cam.y; g.save(); g.translate(Math.floor(dx)+13,Math.floor(dy)+13); g.rotate(ba.spin); g.translate(-14,-14); if(SPR.barrel)g.drawImage(SPR.barrel,0,0); g.restore(); });
  // flow platforms (barrel-platform)
  world.flowPlats.forEach(function(fp){ var dx=fp.x-cam.x, dy=fp.y-cam.y; g.fillStyle=C.copperDk; g.fillRect(Math.floor(dx),Math.floor(dy),fp.w,fp.h); g.fillStyle=C.copper; g.fillRect(Math.floor(dx)+1,Math.floor(dy)+1,fp.w-2,4); g.fillStyle=C.copperHi; g.fillRect(Math.floor(dx)+2,Math.floor(dy)+1,fp.w-4,2); });
  // checkpoints
  world.checkpoints.forEach(function(c){ var dx=c.x-cam.x, dy=c.y-cam.y;
    g.fillStyle=C.steelDk; g.fillRect(Math.floor(dx)+14,Math.floor(dy)+8,4,TILE-8);
    // crank wheel
    drawValveWheel(g,dx+16,dy+10,7, c.active?globalTime*3:0, c.active?C.slime:C.steel, c.active?C.slimeHi:C.steelHi);
    if(c.flash>0){ g.globalAlpha=c.flash; g.fillStyle=C.slimeHi; g.fillRect(Math.floor(dx),Math.floor(dy)-4,TILE,4); g.globalAlpha=1; }
  });
  // valves
  world.valves.forEach(function(v){ drawValve(g,v); });
}

function drawValve(g,v){
  var dx=v.x-cam.x, dy=v.y-cam.y;
  var col={drain:C.red, flow:C.blue, geyser:C.brass, master:C.gold}[v.kind];
  var colHi={drain:C.heartHi, flow:'#8fb4ff', geyser:C.goldHi, master:C.goldHi}[v.kind];
  // mount
  g.fillStyle=C.steelDk; g.fillRect(Math.floor(dx)+8,Math.floor(dy)+8,TILE-16,TILE-8);
  var r = v.kind==='master'?11:9;
  drawValveWheel(g,dx+16,dy+ (v.kind==='master'?14:16), r, v.angle, col, colHi);
  // drain countdown ring
  if(v.kind==='drain' && v.turned){
    var ds=world.drainState[ (function(){for(var i=0;i<world.drainState.length;i++){ if(world.valves[world.drainState[i].valveIdx]===v) return i;} return -1;})() ];
    if(ds){
      var frac=ds.timer/12;
      g.strokeStyle= ds.timer<3?C.red:C.slimeHi; g.lineWidth=2;
      g.beginPath(); g.arc(dx+16,dy+16,14,-Math.PI/2,-Math.PI/2+frac*Math.PI*2); g.stroke();
    }
  }
}

/* Player render with squash/stretch, i-frame flicker, facing flip */
function drawPlayer(g){
  var p=player;
  if(p.iframe>0 && Math.floor(globalTime*20)%2===0 && STATE==='play') return; // flicker
  var frame=pickMickFrame();
  if(!frame) return;
  var dx=p.x+p.w/2-16, dy=p.y+p.h-48;
  // squash: scale
  var sq=1, st=1;
  if(p.squash>0){ var f=p.squash/PHYS.SQUASH; sq=1+0.25*f; st=1-0.25*f; }
  g.save();
  g.translate(Math.floor(dx)+16, Math.floor(dy)+48);
  g.scale(p.facing>=0?1:-1, 1);
  g.scale(sq,st);
  g.translate(-16,-48);
  g.drawImage(frame,0,0);
  g.restore();
}

function pickMickFrame(){
  var p=player, f=p.animFrame;
  switch(p.anim){
    case 'idle': return f%2? MICK.idle1:MICK.idle0;
    case 'walk': return [MICK.walk0,MICK.walk1,MICK.walk2,MICK.walk3][f%4];
    case 'run': return [MICK.run0,MICK.run1,MICK.run2,MICK.run3][f%4];
    case 'skid': return MICK.skid;
    case 'jump': return MICK.jump;
    case 'fall': return MICK.fall;
    case 'duck': return MICK.duck;
    case 'slide': return MICK.slide;
    case 'whack': return [MICK.whack0,MICK.whack1,MICK.whack2][Math.min(2,f%3)];
    case 'crank': return f%2? MICK.crank1:MICK.crank0;
    case 'hurt': return MICK.hurt;
    case 'victory': return MICK.victory;
  }
  return MICK.idle0;
}

function drawParticles(g){
  world.particles.forEach(function(pt){
    var a=pt.life/pt.max; g.globalAlpha=Math.max(0,a);
    g.fillStyle=pt.col;
    var dx=Math.floor(pt.x-cam.x), dy=Math.floor(pt.y-cam.y);
    if(pt.line){ g.fillRect(dx,dy,6,1); }
    else g.fillRect(dx,dy,Math.ceil(pt.r),Math.ceil(pt.r));
  });
  g.globalAlpha=1;
  world.floatText.forEach(function(f){
    g.globalAlpha=Math.max(0,f.life/f.max); g.fillStyle=f.col; g.font='bold 10px "Courier New",monospace'; g.textAlign='center';
    g.fillText(f.txt, Math.floor(f.x-cam.x), Math.floor(f.y-cam.y));
  });
  g.globalAlpha=1; g.textAlign='left';
}

/* Foreground pipe strips at 1.15x parallax */
function drawForeground(g){
  g.globalAlpha=0.9;
  var fo=-(cam.x*1.15)%256;
  for(var fx=fo-256;fx<BASE_W;fx+=256){
    // top pipe strip
    g.fillStyle=C.copperDk; g.fillRect(Math.floor(fx),0,90,10);

    // bottom pipe strip
    g.fillStyle=C.steelDk; g.fillRect(Math.floor(fx)+128,BASE_H-8,80,8);
    g.fillStyle=C.pipeSteel; g.fillRect(Math.floor(fx)+128,BASE_H-7,80,3);
  }
  g.globalAlpha=1;
}

function drawHUD(g){
  // top bar panel

  for(var i=0;i<3;i++){

  }

  g.fillStyle=C.goldHi; g.fillText('x'+hud.fittings+'/'+world.fittingsTotal, 76, 13);
  // score
  g.fillStyle=C.ink; g.textAlign='right'; g.fillText('SCORE '+hud.score, BASE_W-56,13);

  g.fillStyle= full? C.gold : C.slime;
  g.fillRect(gx+1,gy+1,Math.floor((gw-2)*spd),gh-2);
  if(full && Math.floor(globalTime*8)%2===0){ g.fillStyle=C.goldHi; g.fillRect(gx+1,gy+1,gw-2,gh-2); }
  g.fillStyle=C.ink; g.font='6px monospace'; g.fillText('SPD',gx+gw-16,gy+gh+7);
  g.textAlign='left';

  // zone banner
  world.banners.forEach(function(b){
    if(b.timer>0){
      var names=['STONE WORKS','STEEL MAINS','THE CISTERN'];
      var a=Math.min(1,b.timer)*Math.min(1,(2.6-b.timer)*3);
      g.globalAlpha=Math.min(1,a+0.2);
      g.fillStyle='rgba(10,20,32,0.75)'; g.fillRect(0,BASE_H/2-24,BASE_W,48);
      g.fillStyle=C.gold; g.font='bold 20px "Courier New",monospace'; g.textAlign='center';
      g.fillText(names[b.n]||'ZONE', BASE_W/2, BASE_H/2+4);
      g.fillStyle=C.ink; g.font='9px "Courier New",monospace';
      g.fillText('ZONE '+(b.n+1), BASE_W/2, BASE_H/2-10);
      g.globalAlpha=1; g.textAlign='left';
    }
  });

  // idle objective arrow
  if(idleTimer>5 && STATE==='play'){
    var pulse=0.5+0.5*Math.sin(globalTime*4);
    g.globalAlpha=0.4+0.4*pulse; g.fillStyle=C.gold;
    var ax=BASE_W-40, ay=BASE_H/2;
    g.beginPath(); g.moveTo(ax,ay-8); g.lineTo(ax+14,ay); g.lineTo(ax,ay+8); g.closePath(); g.fill();
    g.font='8px monospace'; g.textAlign='center'; g.fillText('THIS WAY',ax+2,ay+22); g.globalAlpha=1; g.textAlign='left';
  }
}

function drawSigns(g){

function drawWin(g){
  player.winTimer += 0; // updated in loop
  g.fillStyle='rgba(8,16,26,0.6)'; g.fillRect(0,0,BASE_W,BASE_H);
  // wall of water rising behind glass
  var floodH = Math.min(BASE_H, world.winFlood*BASE_H);
  g.fillStyle='rgba(46,134,171,0.55)'; g.fillRect(0,BASE_H-floodH,BASE_W,floodH);
  g.fillStyle=C.waterHi; g.fillRect(0,BASE_H-floodH,BASE_W,3);
  for(var i=0;i<BASE_W;i+=10){ g.fillStyle=C.foam; g.fillRect(i,BASE_H-floodH+Math.sin(globalTime*4+i)*2,4,2); }
  // stamp
  g.textAlign='center';
  var pop=Math.min(1,player.winTimer*2);
  g.save(); g.translate(BASE_W/2,70); g.scale(pop,pop);
  g.strokeStyle=C.gold; g.lineWidth=3; g.strokeRect(-140,-24,280,48);
  g.fillStyle=C.gold; g.font='bold 26px "Courier New",monospace'; g.fillText('SHIFT COMPLETE',0,10);
  g.restore();
  if(player.winTimer>0.8){
    g.fillStyle=C.ink; g.font='11px "Courier New",monospace';
    var ts=Math.floor(stats.timeSec||0);
    var lines=[
      'FITTINGS: '+stats.fittings+' / '+world.fittingsTotal,
      'ENEMIES CLEARED: '+stats.kills,
      'PIPES PATCHED: '+stats.patches,
      'TIME: '+Math.floor(ts/60)+':'+('0'+(ts%60)).slice(-2),
      'HEARTS BONUS + TIME BONUS: '+stats.bonus,
      '',
      'FINAL SCORE: '+hud.score
    ];
    var yy=110; for(var i=0;i<lines.length;i++){ g.fillStyle= i===6?C.gold:C.ink; g.font= i===6?'bold 14px "Courier New",monospace':'11px "Courier New",monospace'; g.fillText(lines[i],BASE_W/2,yy); yy+=17; }
    g.fillStyle= Math.floor(globalTime*2)%2?C.gold:C.ink; g.font='bold 11px "Courier New",monospace';
    g.fillText('PRESS ENTER / TAP TO PLAY AGAIN', BASE_W/2, BASE_H-12);
  }
  g.textAlign='left';
}

/* ---------------------------------------------------------------
   23. STATE MACHINE / MENU HANDLING
   --------------------------------------------------------------- */
function handleMenuKey(k){
  if(k==='enter'||k===' '||k==='spacebar'){
    if(STATE==='title'){ STATE='howto'; }
    else if(STATE==='howto'){ startGame(); }
    else if(STATE==='win'){ startGame(); }
  }
  if(STATE==='paused' && k==='r'){ startGame(); }
  if(STATE==='play' && k==='r'){ /* soft restart via pause only */ }
}
function onFirstGesture(){
  Audio2.init();
  if(Audio2.ctx && Audio2.ctx.state==='suspended') Audio2.ctx.resume();
  Audio2.startMusic();
}
function advanceOnTap(){
  if(STATE==='title'){ STATE='howto'; }
  else if(STATE==='howto'){ startGame(); }
  else if(STATE==='win'){ startGame(); }
}
function startGame(){
  initWorld();
  STATE='play';
  idleTimer=0;
  onFirstGesture();
}
function togglePause(){
  if(STATE==='play'){ STATE='paused'; }
  else if(STATE==='paused'){ STATE='play'; }
}
function toggleMute(){
  Audio2.muted=!Audio2.muted;
  Audio2.setMuted(Audio2.muted);
  var mb=document.getElementById('muteBtn'); if(mb) mb.innerHTML= Audio2.muted?'&#128263;':'&#128266;';
}

/* ---------------------------------------------------------------
   24. MAIN LOOP
   --------------------------------------------------------------- */
var lastT=0;
function frame(ts){
  var dt=(ts-lastT)/1000; lastT=ts;
  if(!isFinite(dt)||dt<0) dt=0;
  if(dt>DT_CAP) dt=DT_CAP; // cap
  globalTime+=dt;
  Audio2.updateMusic();

  if(STATE==='play'){
    updateWhack(dt);
    updateValves(dt);
    updateWaterSystems(dt);
    updatePlayer(dt);
    updateEnemies(dt);
    updateCheckpoints(dt);
    updateParticles(dt);
    updateCamera(dt);
  } else if(STATE==='win'){
    player.winTimer+=dt;
    world.winFlood=Math.min(1, world.winFlood+dt*0.4);
    updateParticles(dt);
  } else if(STATE==='paused'){
    // frozen
  }
  render();
  requestAnimationFrame(frame);
}

/* ---------------------------------------------------------------
   25. UTIL
   --------------------------------------------------------------- */
function clamp(v,a,b){ return v<a?a:(v>b?b:v); }
function lerp(a,b,t){ return a+(b-a)*t; }

/* ---------------------------------------------------------------
   26. BUILD ALL ART
   --------------------------------------------------------------- */

  buildStoneTile('stone', C.stone, C.stoneHi, C.stoneLo, {seed:11});

  buildSteelTile('steelVent', C.steel, C.steelHi, C.steelLo, {seed:13, vent:true});
  buildGrateTile();
  buildCrumbleTile();
  buildPipeTiles();
  buildBgArch();
  buildChain();
  buildLamp();
  buildMick();
  buildSprites();
}

/* ---------------------------------------------------------------
   27. BOOT
   --------------------------------------------------------------- */
function boot(){
  initCanvas();
  buildArt();
  bindKeys();
  buildTouch();
  // click/tap on canvas advances menus + first gesture
  var wrap=document.getElementById('wrap');
  wrap.addEventListener('pointerdown', function(){ Input.anyGesture=true; onFirstGesture(); if(STATE==='title'||STATE==='howto'||STATE==='win') advanceOnTap(); });
  document.getElementById('pauseBtn').addEventListener('click', function(e){ e.stopPropagation(); togglePause(); });
  document.getElementById('muteBtn').addEventListener('click', function(e){ e.stopPropagation(); toggleMute(); });
  // init world once for title-screen Mick preview & so world exists
  initWorld();
  STATE='title';
  requestAnimationFrame(frame);
}

// Expose internals for headless tests
GAME.parseLevel=parseLevel;
GAME.LEVEL_ROWS_FN=buildLevelRows;
GAME.PHYS=PHYS;
GAME.KNOWN_CHARS=KNOWN_CHARS;
GAME.makeSimPlayer=makePlayer;
GAME.simConstants={TILE:TILE, DT_CAP:DT_CAP, SUBSTEP_SPEED:SUBSTEP_SPEED};
if(typeof window!=='undefined'){ window.MICK_GAME=GAME; window.addEventListener('DOMContentLoaded', boot); }
if(typeof module!=='undefined'){ module.exports=GAME; }

})();
